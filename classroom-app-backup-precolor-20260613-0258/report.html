<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ภาพรวมการเข้าเรียน — ClassKru</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1d9e75;--pk:#0f6e56;--pbg:#f0fdf4;--pbd:#86efac;
  --late:#f59e0b;--lbg:#fffbeb;--lbd:#fcd34d;
  --absent:#ef4444;--abg:#fef2f2;--abd:#fca5a5;
  --leave:#6366f1;--vbg:#eef2ff;--vbd:#a5b4fc;
  --bg:#f0f4f8;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --sh:0 1px 4px rgba(0,0,0,.07);--sh-md:0 4px 14px rgba(0,0,0,.10);
  --tr:all .18s cubic-bezier(.4,0,.2,1);
  --sidebar:260px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* SHARED */
.btn{font-family:'Sarabun',sans-serif;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--tr);border-radius:12px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--primary);color:#fff;font-size:14px;padding:9px 18px;}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);font-size:13px;padding:7px 14px;}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:10px;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(15,23,42,.88);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:22px;white-space:nowrap;z-index:9999;transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* LAYOUT */
.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:var(--sh);}
.sb-logo{display:flex;justify-content:center;align-items:center;height:96px;border-bottom:1px solid var(--border);}
.sb-nav-sec{padding:14px 14px 4px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
.sb-link{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--tr);border-left:3px solid transparent;}
.sb-link:hover{background:#f8fafc;color:var(--text);}
.sb-link.active{background:var(--pbg);color:var(--primary);border-left-color:var(--primary);}
.sb-link .ico{width:22px;display:flex;align-items:center;justify-content:center;}
.sb-link .ico svg{width:18px;height:18px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.sb-link.active .ico svg,.sb-link:hover .ico svg{stroke:var(--primary);}
.sb-spacer{flex:1;}
.sb-date{padding:12px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--sh);}
.topbar-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
.content{padding:20px 32px 60px;display:flex;flex-direction:column;gap:16px;max-width:960px;}

/* CLASS TABS — scrollable pills */
.class-tabs{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.class-tabs::-webkit-scrollbar{display:none;}
.class-tab{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:var(--tr);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px;}
.class-tab:hover{border-color:#94a3b8;color:var(--text);}
.class-tab.active{border-color:var(--primary);background:var(--pbg);color:var(--primary);}
.class-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* MINI CALENDAR */
.mini-cal{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:12px 14px;box-shadow:var(--sh);}
.mini-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mini-cal-month{font-size:14px;font-weight:800;}
.mini-cal-nav{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);}
.mini-cal-nav:hover{background:#f1f5f9;}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-cal-dow{font-size:10px;font-weight:800;color:#94a3b8;text-align:center;padding:2px 0;}
.mini-cal-day{font-size:12px;font-weight:600;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;transition:var(--tr);color:var(--text);}
.mini-cal-day:hover:not(.mcd-empty):not(.mcd-weekend){background:#f1f5f9;}
.mini-cal-day.mcd-today{background:var(--pbg);color:var(--primary);font-weight:800;}
.mini-cal-day.mcd-selected{background:var(--primary);color:#fff;font-weight:800;}
.mini-cal-day.mcd-weekend{color:#cbd5e1;}
.mini-cal-day.mcd-empty{cursor:default;}
.mini-cal-day.mcd-has-data::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--primary);margin:1px auto 0;}

/* VIEW TABS */
.view-tabs{display:flex;background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:4px;gap:4px;box-shadow:var(--sh);}
.vtab{flex:1;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:10px 8px;border-radius:12px;border:none;cursor:pointer;transition:var(--tr);color:var(--muted);background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
.vtab:hover{background:#f8fafc;color:var(--text);}
.vtab.active{background:var(--primary);color:#fff;}
.vtab-sub{font-size:10px;font-weight:600;opacity:.8;}

/* SECTION PANELS */
.section-view{display:none;}
.section-view.active{display:flex;flex-direction:column;gap:14px;}

/* ── STAT LARGE CARDS ── */
.stat-lg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat-lg{border-radius:18px;padding:16px 14px;text-align:center;border:2px solid transparent;}
.stat-lg-p{background:#f0fdf4;border-color:#86efac;}
.stat-lg-l{background:#fffbeb;border-color:#fcd34d;}
.stat-lg-a{background:#fef2f2;border-color:#fca5a5;}
.stat-lg-v{background:#eef2ff;border-color:#a5b4fc;}
.stat-lg-num{font-size:40px;font-weight:800;line-height:1;}
.stat-lg-lbl{font-size:14px;font-weight:700;margin-top:4px;}
.stat-lg-p .stat-lg-num,.stat-lg-p .stat-lg-lbl{color:#15803d;}
.stat-lg-l .stat-lg-num,.stat-lg-l .stat-lg-lbl{color:#b45309;}
.stat-lg-a .stat-lg-num,.stat-lg-a .stat-lg-lbl{color:#dc2626;}
.stat-lg-v .stat-lg-num,.stat-lg-v .stat-lg-lbl{color:#4338ca;}

/* ALERT CARDS */
.alert-section{background:#fff;border-radius:18px;border:1.5px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.alert-head{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;}
.alert-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;}
.alert-count{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;}
.alert-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--tr);}
.alert-row:last-child{border:none;}
.alert-row:hover{background:#f8fafc;}
.alert-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.alert-info{flex:1;}
.alert-name{font-size:15px;font-weight:800;}
.alert-sub{font-size:12px;margin-top:2px;}
.alert-badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-danger{background:#fef2f2;color:#dc2626;}
.badge-warning{background:#fffbeb;color:#b45309;}

/* ── WEEKLY HEATMAP ── */
.week-table{background:#fff;border-radius:18px;border:1.5px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.week-head-row{display:grid;grid-template-columns:160px repeat(5,1fr);gap:0;background:#f8fafc;border-bottom:1px solid var(--border);}
.week-th{font-size:11px;font-weight:800;color:var(--muted);text-align:center;padding:10px 4px;}
.week-th:first-child{text-align:left;padding-left:14px;}
.week-row{display:grid;grid-template-columns:160px repeat(5,1fr);gap:0;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--tr);}
.week-row:last-child{border:none;}
.week-row:hover{background:#f8fafc;}
.week-name-cell{display:flex;align-items:center;gap:8px;padding:10px 14px;}
.week-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.week-name{font-size:13px;font-weight:700;}
.week-dot-cell{display:flex;align-items:center;justify-content:center;padding:10px 4px;}
.week-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.wd-p{background:#dcfce7;color:#15803d;}
.wd-l{background:#fef3c7;color:#92400e;}
.wd-a{background:#fee2e2;color:#991b1b;}
.wd-v{background:#e0e7ff;color:#3730a3;}
.wd-none{background:#f1f5f9;color:#94a3b8;}
.week-risk{background:#fef2f2;}
.week-warn{background:#fffef0;}

/* WEEK SUMMARY */
.week-summary{display:flex;gap:12px;background:#f8fafc;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.wssum{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
.wssum-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* ── TERM VIEW ── */
.term-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--tr);}
.term-row:last-child{border:none;}
.term-row:hover{background:#f8fafc;}
.term-name{font-size:13px;font-weight:700;width:130px;flex-shrink:0;}
.term-dots{display:flex;flex-wrap:wrap;gap:2px;flex:1;}
.td-p{width:9px;height:9px;border-radius:2px;background:#22c55e;}
.td-l{width:9px;height:9px;border-radius:2px;background:#f59e0b;}
.td-a{width:9px;height:9px;border-radius:2px;background:#ef4444;}
.td-v{width:9px;height:9px;border-radius:2px;background:#6366f1;}
.td-n{width:9px;height:9px;border-radius:2px;background:#e2e8f0;}
.term-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:80px;}
.term-pct{font-size:13px;font-weight:800;}
.term-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;}
.tag-ok{background:#f0fdf4;color:#15803d;}
.tag-risk{background:#fffbeb;color:#b45309;}
.tag-danger{background:#fef2f2;color:#dc2626;}

/* ── HEALTH VIEW ── */
.health-meter{background:#fff;border-radius:18px;border:1.5px solid var(--border);padding:20px;box-shadow:var(--sh);}
.health-score-wrap{display:flex;align-items:center;gap:20px;margin-bottom:16px;}
.health-score-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;border:4px solid;}
.health-score-num{font-size:24px;font-weight:800;line-height:1;}
.health-score-lbl{font-size:10px;font-weight:700;}
.health-bar-wrap{flex:1;}
.health-bar-label{font-size:13px;font-weight:700;margin-bottom:4px;}
.health-bar-track{height:12px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
.health-bar-fill{height:100%;border-radius:99px;transition:width .6s;}

.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:14px;box-shadow:var(--sh);}
.insight-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.insight-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc;}
.insight-row:last-child{border:none;}
.insight-rank{font-size:12px;font-weight:800;color:#94a3b8;width:18px;}
.insight-name{font-size:13px;font-weight:700;flex:1;}
.insight-val{font-size:12px;font-weight:800;}

/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:6px 12px;}
.date-nav-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);}
.date-nav-btn:hover{background:#f1f5f9;}
.date-nav-label{font-size:13px;font-weight:700;flex:1;text-align:center;min-width:160px;}
.today-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:var(--tr);}
.today-btn:hover{background:#f1f5f9;}

/* ── MOBILE ── */
@media(max-width:767px){
  .main{margin-left:0;}
  .sidebar{display:none;}
  .content{padding:12px 12px 80px;}
  .stat-lg-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .stat-lg-num{font-size:30px;}
  .stat-lg-lbl{font-size:12px;}
  .topbar{padding:0 14px;}
  .insight-grid{grid-template-columns:1fr;}
  .week-head-row,.week-row{grid-template-columns:110px repeat(5,1fr);}
  .week-name{font-size:11px;}
  .term-name{width:90px;font-size:12px;}
}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8edf2;height:60px;display:none;z-index:200;box-shadow:0 -1px 0 rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Sarabun',sans-serif;padding:6px 0 4px;}
.bn-ico svg{width:24px;height:24px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bn-lbl{font-size:10px;font-weight:600;color:#9ca3af;}
.bn-item.active .bn-ico svg{stroke:var(--primary);}
.bn-item.active .bn-lbl{color:var(--primary);font-weight:700;}
@media(max-width:767px){.bottom-nav{display:flex;}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo"><img src="classkru-logo.png" alt="ClassKru" style="height:68px;width:auto;"></div>
    <div class="sb-nav-sec">เมนู</div>
    <div class="sb-link" onclick="go('index.html')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>หน้าหลัก</div>
    <div class="sb-link active"><span class="ico"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>ภาพรวมการเข้าเรียน</div>
    <div class="sb-link" onclick="go('attendance.html?class='+currentClass)"><span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg></span>เช็คชื่อ</div>
    <div class="sb-link" onclick="go('student.html?class='+currentClass+'&id=0')"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg></span>นักเรียน</div>
    <div class="sb-link" onclick="showToast('ตั้งค่า — เร็วๆ นี้')"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>ตั้งค่า</div>
    <div class="sb-spacer"></div>
    <div class="sb-date" id="sb-date"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#f0fdf4;border-radius:8px;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg>
        </span>
        <div>
          <div>ภาพรวมการเข้าเรียน</div>
          <div id="topbar-class-sub" style="font-size:12px;font-weight:600;color:var(--primary);margin-top:1px;"></div>
        </div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="openClassSheet()" style="gap:7px;margin-left:auto;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        เลือกห้อง
      </button>
    </div>

    <div class="content">

      <!-- CLASS TABS -->
      <div class="class-tabs" id="class-tabs"></div>

      <!-- VIEW TABS -->
      <div class="view-tabs">
        <button class="vtab active" onclick="switchView('daily',this)">
          วันนี้<span class="vtab-sub">Daily</span>
        </button>
        <button class="vtab" onclick="switchView('weekly',this)">
          รายสัปดาห์<span class="vtab-sub">Weekly</span>
        </button>
        <button class="vtab" onclick="switchView('term',this)">
          ทั้งเทอม<span class="vtab-sub">Term</span>
        </button>
        <button class="vtab" onclick="switchView('health',this)">
          สุขภาพห้อง<span class="vtab-sub">Health</span>
        </button>
      </div>

      <!-- ══ DAILY VIEW ══ -->
      <div class="section-view active" id="view-daily">

        <!-- DATE BAR -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-outline" onclick="openCalPopup()" style="gap:8px;font-size:14px;font-weight:700;padding:9px 16px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span id="daily-date-label">—</span>
          </button>
          <button class="today-btn" onclick="goToday()">วันนี้</button>

<script>
const CLASSES=CK.CLASSES;
const params=new URLSearchParams(window.location.search);
let currentClass=params.get('class')||'m31';
if(!CLASSES.find(c=>c.id===currentClass)) currentClass='m31';

const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DAYS_FULL=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const DAYS_SHORT=['อา','จ','อ','พ','พฤ','ศ','ส'];
const DOT={present:'wd-p',late:'wd-l',absent:'wd-a',leave:'wd-v'};
const DOT_LBL={present:'มา',late:'สาย',absent:'ขาด',leave:'ลา'};

/* ── ALERT THRESHOLDS ── */
const THR={
  absentConsec:2,   // ขาดติดกัน N วัน = เตือน
  latePerWeek:3,    // สายเกิน N ครั้ง/สัปดาห์ = เตือน
  attendMin:80,     // มาเรียนต่ำกว่า N% = เสี่ยง
  absTotal:CK.MAX_ABSENT, // ขาด+ลา >= N = เสี่ยงสูง
};

/* ── STATE ── */
let viewDate=new Date(); // daily anchor
let weekOffset=0;       // weekly: 0=สัปดาห์นี้, -1=ที่แล้ว
let currentView='daily';

function go(url){ window.location.href=url; }
function showToast(msg){
  const t=document.getElementById('toast-el');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ── HELPERS ── */
function fmtDateThai(d){
  return `${DAYS_FULL[d.getDay()]}ที่ ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
}
function fmtShort(d){
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function skipWeekend(d, dir){
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+dir);
  return d;
}
function getMonWeekDates(offset){
  // หาวันจันทร์ของสัปดาห์ปัจจุบัน + offset week
  const today=new Date();
  const mon=new Date(today);
  const day=today.getDay()||7; // อาทิตย์=0→7
  mon.setDate(today.getDate()-day+1+offset*7);
  return [0,1,2,3,4].map(i=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i); return d;
  });
}

/* ── CLASS TABS — dot + ชื่อ ── */
function buildClassTabs(){
  document.getElementById('class-tabs').innerHTML=CLASSES.map(c=>{
    const lc=CK.LEVEL_COLORS[c.level||'junior'];
    const active=c.id===currentClass;
    return `<button class="class-tab ${active?'active':''}" onclick="switchClass('${c.id}')"
      style="${active?`border-color:${lc.icon};background:${lc.bg};color:${lc.text};`:''}">
      <span class="class-tab-dot" style="background:${lc.icon}"></span>
      ${c.name}
    </button>`;
  }).join('');
}
function switchClass(id){
  currentClass=id;
  const cls=CLASSES.find(c=>c.id===id);
  const sub=document.getElementById('topbar-class-sub');
  if(sub&&cls) sub.textContent=`${cls.name} · ${cls.count} คน`;
  buildClassTabs(); renderCal(); renderAll();
}

/* ── MINI CALENDAR ── */
let calYear, calMonth;
function initCal(){
  calYear=viewDate.getFullYear();
  calMonth=viewDate.getMonth();
  renderCal();
}
function calPrevMonth(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNextMonth(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

function renderCal(){
  const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('cal-month-label').textContent=`${M[calMonth]} ${calYear+543}`;
  const today=new Date();
  const todayStr=CK.fmtKey(today);
  const selStr=CK.fmtKey(viewDate);
  // หา attendance data ของเดือนนี้ (วันที่มีข้อมูล)
  const students=CK.getStudents(currentClass);
  const daysWithData=new Set();
  students.forEach(s=>{
    Object.keys(s.history).forEach(k=>{
      if(k.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)) daysWithData.add(k);
    });
  });

  const firstDay=new Date(calYear,calMonth,1).getDay(); // 0=อา
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html=DOW.map(d=>`<div class="mini-cal-dow">${d}</div>`).join('');
  // padding
  for(let i=0;i<firstDay;i++) html+=`<div class="mini-cal-day mcd-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d);
    const key=CK.fmtKey(dt);
    const isWeekend=dt.getDay()===0||dt.getDay()===6;
    const isToday=key===todayStr;
    const isSel=key===selStr;
    const hasData=daysWithData.has(key);
    const cls=['mini-cal-day',isWeekend?'mcd-weekend':'',isToday&&!isSel?'mcd-today':'',isSel?'mcd-selected':'',hasData&&!isSel?'mcd-has-data':''].filter(Boolean).join(' ');
    const onclick=isWeekend?'':` onclick="selectCalDay(${calYear},${calMonth},${d})"`;
    html+=`<div class="${cls}"${onclick}>${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function selectCalDay(y,m,d){
  viewDate=new Date(y,m,d);
  renderCal();
  renderDaily();
  setTimeout(closeCalPopup,180);
}

/* ── VIEW SWITCH ── */
function switchView(view, btn){
  currentView=view;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section-view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  renderAll();
}

function renderAll(){
  if(currentView==='daily') renderDaily();
  else if(currentView==='weekly') renderWeekly();
  else if(currentView==='term') renderTerm();
  else if(currentView==='health') renderHealth();
}

/* ══════════════════
   DAILY VIEW
══════════════════ */
function changeDay(dir){
  viewDate.setDate(viewDate.getDate()+dir);
  viewDate=skipWeekend(new Date(viewDate),dir);
  calYear=viewDate.getFullYear(); calMonth=viewDate.getMonth();
  renderCal(); renderDaily();
}
function goToday(){
  viewDate=new Date();
  calYear=viewDate.getFullYear(); calMonth=viewDate.getMonth();
  renderCal(); renderDaily();
}

function renderDaily(){
  const dk=CK.fmtKey(viewDate);
  const students=CK.getStudents(currentClass);
  let p=0,l=0,a=0,v=0;
  students.forEach(s=>{
    const r=s.history[dk];
    if(!r) return;
    if(r.status==='present')p++; else if(r.status==='late')l++;
    else if(r.status==='absent')a++; else v++;
  });
  const checked=p+l+a+v;

  document.getElementById('daily-date-label').textContent=fmtDateThai(viewDate);

  // big stats
  document.getElementById('daily-stats').innerHTML=`
    <div class="stat-lg stat-lg-p"><div class="stat-lg-num">${p}</div><div class="stat-lg-lbl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-3px;margin-right:4px"><path d="M20 6L9 17l-5-5"/></svg>มาเรียน</div></div>
    <div class="stat-lg stat-lg-l"><div class="stat-lg-num">${l}</div><div class="stat-lg-lbl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:4px"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>มาสาย</div></div>
    <div class="stat-lg stat-lg-a"><div class="stat-lg-num">${a}</div><div class="stat-lg-lbl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-3px;margin-right:4px"><path d="M18 6L6 18M6 6l12 12"/></svg>ขาดเรียน</div></div>
    <div class="stat-lg stat-lg-v"><div class="stat-lg-num">${v}</div><div class="stat-lg-lbl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:4px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>ลา</div></div>`;

  // หา alerts
  const alerts=buildDailyAlerts(students, dk, viewDate);
  const alertHtml=alerts.length===0
    ? `<div style="padding:20px;text-align:center;font-size:14px;color:#15803d;font-weight:700;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-4px;margin-right:8px"><path d="M20 6L9 17l-5-5"/></svg>
        ไม่มีนักเรียนที่ต้องติดตามวันนี้
      </div>`
    : alerts.map(al=>`
        <div class="alert-row" onclick="go('student.html?class=${currentClass}&id=${al.student.id}')">
          <div class="alert-av" style="background:${al.student.col.bg};color:${al.student.col.c}">${al.student.fn[0]}</div>
          <div class="alert-info">
            <div class="alert-name">${al.student.fn} ${al.student.ln}</div>
            <div class="alert-sub" style="color:${al.level==='danger'?'#dc2626':'#b45309'}">${al.reason}</div>
          </div>
          <span class="alert-badge ${al.level==='danger'?'badge-danger':'badge-warning'}">${al.tag}</span>
        </div>`).join('');

  document.getElementById('daily-alerts').innerHTML=`
    <div class="alert-head">
      <div class="alert-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${alerts.length>0?'#dc2626':'#15803d'}" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        นักเรียนที่ต้องติดตาม
      </div>
      ${alerts.length>0?`<span class="alert-count" style="background:#fef2f2;color:#dc2626">${alerts.length} คน</span>`:''}
    </div>
    ${alertHtml}`;
}

function buildDailyAlerts(students, dk, date){
  const alerts=[];
  students.forEach(s=>{
    const stats=CK.getStudentAttendStats(s);
    const reasons=[];
    let level='warning';

    // ขาดเกินเกณฑ์
    if(stats.overLimit){ reasons.push(`ขาด+ลา ${stats.miss} วัน (เกินเกณฑ์ ${CK.MAX_ABSENT} วัน)`); level='danger'; }

    // ขาดติดกัน N วัน
    const consecAbsent=getConsecAbsent(s, dk);
    if(consecAbsent>=THR.absentConsec){
      reasons.push(`ขาดติดกัน ${consecAbsent} วัน`);
      if(consecAbsent>=3) level='danger';
    }

    // สายบ่อยในสัปดาห์นี้
    const lateThisWeek=countLateThisWeek(s, date);
    if(lateThisWeek>=THR.latePerWeek){
      reasons.push(`มาสาย ${lateThisWeek} ครั้งสัปดาห์นี้`);
    }

    // อัตราต่ำ
    if(stats.total>0){
      const pct=Math.round(stats.present/stats.total*100);
      if(pct<THR.attendMin) reasons.push(`มาเรียน ${pct}% (ต่ำกว่า ${THR.attendMin}%)`);
    }

    if(reasons.length>0){
      const tag=level==='danger'?'เสี่ยงสูง':consecAbsent>=THR.absentConsec?'ขาดติดกัน':'ต้องติดตาม';
      alerts.push({student:s, reason:reasons[0], tag, level});
    }
  });
  // เรียงตาม danger ก่อน
  return alerts.sort((a,b)=>a.level==='danger'&&b.level!=='danger'?-1:1);
}

function getConsecAbsent(student, fromKey){
  const keys=Object.keys(student.history).sort((a,b)=>b.localeCompare(a));
  let consec=0;
  for(const k of keys){
    if(k>fromKey) continue;
    const s=student.history[k].status;
    if(s==='absent'||s==='leave') consec++;
    else break;
  }
  return consec;
}

function countLateThisWeek(student, date){
  const weekDates=getMonWeekDates(weekOffset);
  const keys=weekDates.map(d=>CK.fmtKey(d));
  let count=0;
  keys.forEach(k=>{ if(student.history[k]?.status==='late') count++; });
  return count;
}

/* ══════════════════
   WEEKLY VIEW
══════════════════ */
function changeWeek(dir){ weekOffset+=dir; renderWeekly(); }
function goThisWeek(){ weekOffset=0; renderWeekly(); }

function renderWeekly(){
  const weekDates=getMonWeekDates(weekOffset);
  const keys=weekDates.map(d=>CK.fmtKey(d));
  const students=CK.getStudents(currentClass);

  // label
  const f=weekDates[0], l=weekDates[4];
  document.getElementById('weekly-date-label').textContent=
    `${fmtShort(f)} – ${fmtShort(l)} ${f.getFullYear()+543}`;

  // summary stats
  let totP=0,totL=0,totA=0,totV=0,totAll=0;
  students.forEach(s=>{
    keys.forEach(k=>{
      const r=s.history[k]; if(!r)return; totAll++;
      if(r.status==='present')totP++; else if(r.status==='late')totL++;
      else if(r.status==='absent')totA++; else totV++;
    });
  });
  const pct=totAll>0?Math.round(totP/totAll*100):0;

  const dayHeaders=weekDates.map((d,i)=>`<div class="week-th">${DAYS_SHORT[d.getDay()]}<br><span style="font-size:9px;color:#94a3b8">${d.getDate()}</span></div>`).join('');

  const rows=students.map(s=>{
    const stats=CK.getStudentAttendStats(s);
    const isRisk=stats.riskLevel==='danger';
    const isWarn=stats.riskLevel==='warning';
    const rowClass=isRisk?'week-risk':isWarn?'week-warn':'';
    const dotCells=keys.map(k=>{
      const r=s.history[k];
      const cls=r?DOT[r.status]||'wd-none':'wd-none';
      const lbl=r?DOT_LBL[r.status]:'—';
      return `<div class="week-dot-cell"><div class="week-dot ${cls}" title="${lbl}">${lbl[0]}</div></div>`;
    }).join('');
    return `<div class="week-row ${rowClass}" onclick="go('student.html?class=${currentClass}&id=${s.id}')">
      <div class="week-name-cell">
        <div class="week-av" style="background:${s.col.bg};color:${s.col.c}">${s.fn[0]}</div>
        <div>
          <div class="week-name">${s.fn} ${s.ln}</div>
          ${isRisk?'<div style="font-size:10px;font-weight:700;color:#dc2626;">เสี่ยงสูง</div>':isWarn?'<div style="font-size:10px;font-weight:700;color:#b45309;">ต้องติดตาม</div>':''}
        </div>
      </div>
      ${dotCells}
    </div>`;
  }).join('');

  document.getElementById('weekly-content').innerHTML=`
    <div class="week-table">
      <div class="week-summary">
        <div class="wssum"><span class="wssum-dot" style="background:#22c55e"></span>มา ${pct}%</div>
        <div class="wssum"><span class="wssum-dot" style="background:#f59e0b"></span>สาย ${totL} ครั้ง</div>
        <div class="wssum"><span class="wssum-dot" style="background:#ef4444"></span>ขาด ${totA} ครั้ง</div>
        <div class="wssum"><span class="wssum-dot" style="background:#6366f1"></span>ลา ${totV} ครั้ง</div>
      </div>
      <div class="week-head-row">
        <div class="week-th" style="text-align:left;padding-left:14px">นักเรียน</div>
        ${dayHeaders}
      </div>
      <div style="max-height:55vh;overflow-y:auto;">${rows}</div>
    </div>`;
}

/* ══════════════════
   TERM VIEW
══════════════════ */
function renderTerm(){
  const students=CK.getStudents(currentClass);
  // ดึง 60 วันย้อนหลัง วันทำการ
  const today=new Date();
  const days=[];
  for(let i=59;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    if(d.getDay()===0||d.getDay()===6) continue;
    days.push(CK.fmtKey(d));
  }

  const rows=students.map(s=>{
    const stats=CK.getStudentAttendStats(s);
    const pct=stats.total>0?Math.round(stats.present/stats.total*100):0;
    const tag=stats.overLimit?'tag-danger':stats.riskLevel==='warning'?'tag-risk':'tag-ok';
    const tagLbl=stats.overLimit?'เสี่ยงสูง':stats.riskLevel==='warning'?'เริ่มเสี่ยง':'ปกติ';
    const pctColor=pct>=80?'#15803d':pct>=60?'#b45309':'#dc2626';

    const dots=days.map(k=>{
      const r=s.history[k];
      if(!r) return `<div class="td-n"></div>`;
      const cls={present:'td-p',late:'td-l',absent:'td-a',leave:'td-v'}[r.status]||'td-n';
      return `<div class="${cls}"></div>`;
    }).join('');

    return `<div class="term-row" onclick="go('student.html?class=${currentClass}&id=${s.id}')">
      <div style="flex-shrink:0;display:flex;align-items:center;gap:7px;width:130px;">
        <div class="week-av" style="background:${s.col.bg};color:${s.col.c}">${s.fn[0]}</div>
        <div class="term-name" style="width:auto">${s.fn} ${s.ln}</div>
      </div>
      <div class="term-dots">${dots}</div>
      <div class="term-stats">
        <div class="term-pct" style="color:${pctColor}">${pct}%</div>
        <span class="term-tag ${tag}">${tagLbl}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('term-content').innerHTML=rows;
}

/* ══════════════════
   HEALTH VIEW
══════════════════ */
function renderHealth(){
  const students=CK.getStudents(currentClass);
  const cls=CLASSES.find(c=>c.id===currentClass);

  // คำนวณสุขภาพห้อง
  let totPct=0, absentMap={}, lateMap={}, dayAbsent={};
  students.forEach(s=>{
    const stats=CK.getStudentAttendStats(s);
    const pct=stats.total>0?Math.round(stats.present/stats.total*100):100;
    totPct+=pct;
    absentMap[s.id]={student:s, miss:stats.miss, late:stats.late, pct};
    lateMap[s.id]={student:s, late:stats.late};

    // นับขาดรายวัน
    Object.entries(s.history).forEach(([dk,r])=>{
      if(r.status==='absent'||r.status==='leave'){
        const d=new Date(dk);
        const dayName=DAYS_FULL[d.getDay()];
        dayAbsent[dayName]=(dayAbsent[dayName]||0)+1;
      }
    });
  });

  const avgPct=Math.round(totPct/students.length);
  const healthColor=avgPct>=85?'#15803d':avgPct>=70?'#b45309':'#dc2626';
  const healthLabel=avgPct>=85?'ดีมาก':avgPct>=70?'พอใช้':'ต้องปรับปรุง';

  // top 5 ขาดมากสุด
  const top5Absent=Object.values(absentMap).sort((a,b)=>b.miss-a.miss).slice(0,5);
  // top 5 สายมากสุด
  const top5Late=Object.values(lateMap).sort((a,b)=>b.late-a.late).slice(0,5);
  // วันขาดมากสุด
  const topDay=Object.entries(dayAbsent).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('health-content').innerHTML=`
    <!-- HEALTH METER -->
    <div class="health-meter" style="margin-bottom:14px">
      <div class="health-score-wrap">
        <div class="health-score-circle" style="border-color:${healthColor};color:${healthColor}">
          <div class="health-score-num">${avgPct}</div>
          <div class="health-score-lbl">%</div>
        </div>
        <div class="health-bar-wrap">
          <div class="health-bar-label" style="color:${healthColor}">${cls.name} — ${healthLabel}</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">อัตราการมาเรียนเฉลี่ยของห้อง</div>
          <div class="health-bar-track">
            <div class="health-bar-fill" style="width:${avgPct}%;background:${healthColor}"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;font-weight:700;">
            <span>0%</span><span style="color:#b45309">70%</span><span style="color:#15803d">85%</span><span>100%</span>
          </div>
        </div>
      </div>
      ${topDay?`<div style="background:#f8fafc;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        วันที่ขาดเรียนมากที่สุด: <b style="color:#b45309">${topDay[0]}</b> (${topDay[1]} ครั้ง)
      </div>`:''}
    </div>

    <!-- INSIGHTS -->
    <div class="insight-grid">
      <div class="insight-card">
        <div class="insight-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          ขาดเรียนมากที่สุด
        </div>
        ${top5Absent.map((r,i)=>`
          <div class="insight-row" onclick="go('student.html?class=${currentClass}&id=${r.student.id}')" style="cursor:pointer">
            <div class="insight-rank">${i+1}.</div>
            <div class="insight-name">${r.student.fn} ${r.student.ln}</div>
            <div class="insight-val" style="color:${r.miss>=CK.MAX_ABSENT?'#dc2626':'#b45309'}">${r.miss} วัน</div>
          </div>`).join('')}
      </div>
      <div class="insight-card">
        <div class="insight-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          มาสายมากที่สุด
        </div>
        ${top5Late.map((r,i)=>`
          <div class="insight-row" onclick="go('student.html?class=${currentClass}&id=${r.student.id}')" style="cursor:pointer">
            <div class="insight-rank">${i+1}.</div>
            <div class="insight-name">${r.student.fn} ${r.student.ln}</div>
            <div class="insight-val" style="color:#b45309">${r.late} ครั้ง</div>
          </div>`).join('')}
      </div>
      <div class="insight-card">
        <div class="insight-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          สถานะห้องเรียน
        </div>
        ${(()=>{
          const ok=students.filter(s=>CK.getStudentAttendStats(s).riskLevel==='ok').length;
          const warn=students.filter(s=>CK.getStudentAttendStats(s).riskLevel==='warning').length;
          const danger=students.filter(s=>CK.getStudentAttendStats(s).riskLevel==='danger').length;
          return `
            <div class="insight-row"><div style="width:10px;height:10px;background:#22c55e;border-radius:3px;margin-right:6px"></div><div class="insight-name">ปกติ</div><div class="insight-val" style="color:#15803d">${ok} คน</div></div>
            <div class="insight-row"><div style="width:10px;height:10px;background:#f59e0b;border-radius:3px;margin-right:6px"></div><div class="insight-name">เริ่มเสี่ยง</div><div class="insight-val" style="color:#b45309">${warn} คน</div></div>
            <div class="insight-row"><div style="width:10px;height:10px;background:#ef4444;border-radius:3px;margin-right:6px"></div><div class="insight-name">เสี่ยงสูง</div><div class="insight-val" style="color:#dc2626">${danger} คน</div></div>`;
        })()}
      </div>
      <div class="insight-card">
        <div class="insight-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          ขาดรายวันในสัปดาห์
        </div>
        ${['จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์'].map(day=>`
          <div class="insight-row">
            <div class="insight-name">${day}</div>
            <div style="flex:1;margin:0 8px"><div style="height:5px;background:#f1f5f9;border-radius:99px;overflow:hidden"><div style="height:100%;background:#ef4444;border-radius:99px;width:${Math.min(100,Math.round((dayAbsent[day]||0)/students.length*100*3))}%"></div></div></div>
            <div class="insight-val" style="color:#dc2626">${dayAbsent[day]||0}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ── CALENDAR POPUP ── */
function openCalPopup(){
  calYear=viewDate.getFullYear(); calMonth=viewDate.getMonth();
  renderCal();
  document.getElementById('cal-ov').style.display='block';
  document.getElementById('cal-popup').style.display='block';
}
function closeCalPopup(){
  document.getElementById('cal-ov').style.display='none';
  document.getElementById('cal-popup').style.display='none';
}

/* ── CLASS BOTTOM SHEET ── */
function openClassSheet(){
  const list=document.getElementById('cbs-list');
  list.innerHTML=CLASSES.map(c=>{
    const lc=CK.LEVEL_COLORS[c.level||'junior'];
    const active=c.id===currentClass;
    return `<div onclick="switchClass('${c.id}');closeClassSheet();" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1.5px solid ${active?lc.icon:'#e2e8f0'};background:${active?lc.bg:'#fff'};cursor:pointer;">
      <div style="width:10px;height:10px;border-radius:50%;background:${lc.icon};flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;color:${active?lc.text:'#0f172a'}">${c.name}</div>
        <div style="font-size:11px;color:#64748b;margin-top:1px;">${c.count} คน</div>
      </div>
      ${active?'<span style="font-size:12px;font-weight:800;color:'+lc.text+'">✓</span>':'<span style="color:#cbd5e1;font-size:16px;">›</span>'}
    </div>`;
  }).join('');
  document.getElementById('cbs-ov').style.display='block';
  document.getElementById('cbs-sheet').style.transform='translateX(-50%) translateY(0)';
}
function closeClassSheet(){
  document.getElementById('cbs-ov').style.display='none';
  document.getElementById('cbs-sheet').style.transform='translateX(-50%) translateY(100%)';
}

/* ── INIT ── */
function init(){
  const now=new Date();
  const sbDate=document.getElementById('sb-date');
  if(sbDate) sbDate.textContent=`วัน${DAYS_FULL[now.getDay()]}ที่ ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()+543}`;

  // topbar class name
  const cls=CLASSES.find(c=>c.id===currentClass);
  const sub=document.getElementById('topbar-class-sub');
  if(sub&&cls) sub.textContent=`${cls.name} · ${cls.count} คน`;

  buildClassTabs();
  initCal();
  renderDaily();
}
init();
</script>
