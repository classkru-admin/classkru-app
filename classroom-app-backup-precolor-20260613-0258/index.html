<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ClassKru</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1d9e75;--pk:#0f6e56;--pbg:#f0fdf4;--pbd:#86efac;
  --bg:#f5f7fa;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e8edf2;
  --sh:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.10);
  --tr:all .18s cubic-bezier(.4,0,.2,1);
  --sidebar-w:260px;
}
html,body{height:100%;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);}
.btn{font-family:'Sarabun',sans-serif;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--tr);border-radius:12px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--primary);color:#fff;font-size:15px;padding:10px 20px;}
.btn-primary:hover{background:var(--pk);}

@keyframes spin{to{transform:rotate(360deg);}}

/* toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(15,23,42,.88);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:22px;white-space:nowrap;z-index:9999;transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* notification panel */
.notif-ov{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s;}
.notif-ov.show{opacity:1;pointer-events:all;}
.notif-panel{position:fixed;top:0;right:0;bottom:0;width:min(320px,100vw);background:#fff;box-shadow:var(--sh-md);z-index:401;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.notif-panel.open{transform:translateX(0);}
.notif-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-head-title{font-size:16px;font-weight:800;}
.notif-close{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.notif-list{flex:1;overflow-y:auto;padding:12px;}
.ni{border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:var(--tr);}
.ni:active{opacity:.8;}
.ni-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ni-info{flex:1;}.ni-title{font-size:13px;font-weight:800;}.ni-sub{font-size:11px;margin-top:2px;}
.ni-arrow{color:#94a3b8;font-size:16px;}
.ni-yellow{background:#fffbeb;}.ni-yellow .ni-title{color:#92400e;}.ni-yellow .ni-sub{color:#b45309;}.ni-yellow .ni-ico{background:#fef3c7;}
.ni-red{background:#fef2f2;}.ni-red .ni-title{color:#991b1b;}.ni-red .ni-sub{color:#dc2626;}.ni-red .ni-ico{background:#fee2e2;}
.ni-blue{background:#eff6ff;}.ni-blue .ni-title{color:#1e3a5f;}.ni-blue .ni-sub{color:#1d4ed8;}.ni-blue .ni-ico{background:#dbeafe;}

/* ══ MOBILE ══ */
.m-wrap{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto;}
.m-topbar{background:#fff;border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh);}
.m-topbar-left{display:flex;align-items:center;gap:10px;}
.m-notif-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;position:relative;}
.m-notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:#ef4444;border:2px solid #fff;}
.m-scroll{flex:1;overflow-y:auto;padding:10px 12px 70px;display:flex;flex-direction:column;gap:8px;}
.m-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);height:60px;display:flex;z-index:100;box-shadow:0 -1px 0 rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0);}
.m-bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Sarabun',sans-serif;padding:6px 0 4px;}
.m-bn:active{opacity:.6;}
.m-bn svg{width:24px;height:24px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.m-bn span{font-size:10px;font-weight:600;color:#9ca3af;}
.m-bn.active svg{stroke:var(--primary);}
.m-bn.active span{color:var(--primary);font-weight:700;}

/* ══ DESKTOP ══ */
.d-wrap{display:none;}
@media(min-width:768px){
  .m-wrap{display:none;}
  .d-wrap{display:flex;height:100vh;overflow:hidden;}
  .d-sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;}
  .d-sb-logo{padding:0;border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center;height:96px;}
  .d-sb-sec{padding:14px 16px 4px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
  .d-sb-link{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--tr);border-left:3px solid transparent;}
  .d-sb-link:hover{background:#f8fafc;color:var(--text);}
  .d-sb-link.active{background:var(--pbg);color:var(--primary);border-left-color:var(--primary);}
  .d-sb-link svg{width:18px;height:18px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .15s;}
  .d-sb-link.active svg,.d-sb-link:hover svg{stroke:var(--primary);}
  .d-sb-spacer{flex:1;}
  .d-sb-date{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;}
  .d-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .d-topbar{background:#fff;border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 28px;gap:12px;flex-shrink:0;box-shadow:var(--sh);}
  .d-topbar-title{font-size:16px;font-weight:800;flex:1;}
  .d-scroll{flex:1;overflow-y:auto;padding:28px 48px 40px;}
  .d-content{max-width:680px;}
}

/* ══ SHARED CONTENT ══ */
.date-row{display:flex;align-items:flex-end;justify-content:space-between;}
.date-day{font-size:12px;font-weight:600;color:var(--muted);}
.date-main{font-size:22px;font-weight:800;color:var(--text);line-height:1.1;margin-top:1px;display:flex;align-items:center;gap:6px;}
.date-year{font-size:11px;color:var(--muted);margin-top:1px;}
.now-pill{background:var(--pbg);border:1.5px solid var(--pbd);border-radius:12px;padding:8px 14px;text-align:center;flex-shrink:0;}
.now-pill-lbl{font-size:9px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;}
.now-pill-val{font-size:14px;font-weight:800;color:var(--pk);margin-top:2px;}

/* next class card */
.next-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.next-card-lbl{font-size:10px;font-weight:700;color:var(--muted);padding:8px 12px 0;}
.next-card-body{background:var(--pbg);border-radius:12px;margin:6px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.next-info{display:flex;align-items:center;gap:10px;}
.next-name{font-size:16px;font-weight:800;color:var(--text);}
.next-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.next-cta{width:100%;padding:11px;border-radius:12px;background:var(--primary);color:#fff;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:800;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--tr);box-shadow:0 3px 10px rgba(29,158,117,.3);}
.next-cta:active{transform:scale(.97);box-shadow:none;}
.next-cta:hover{background:var(--pk);}
.no-next{padding:12px;font-size:12px;color:var(--muted);text-align:center;}

/* pending card */
.pending-list{display:flex;flex-direction:column;gap:6px;}
.pi{border-radius:12px;border:1.5px solid transparent;padding:9px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:var(--tr);}
.pi:active{transform:scale(.98);}
.pi-orange{background:#fff7ed;border-color:#fed7aa;}
.pi-orange .pi-title{color:#9a3412;}.pi-orange .pi-sub{color:#c2410c;}.pi-orange .pi-arrow{color:#ea580c;}
.pi-orange .pi-ico{background:#ffedd5;}
.pi-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pi-ico svg{width:22px;height:22px;}
.pi-info{flex:1;min-width:0;}
.pi-title{font-size:13px;font-weight:800;}
.pi-sub{font-size:11px;margin-top:1px;}
.pi-arrow{font-size:16px;font-weight:700;flex-shrink:0;}

/* timetable */
.tt-wrap{background:#fff;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.tt-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);}
.tt-title{font-size:12px;font-weight:800;}
.tt-tag{font-size:10px;font-weight:800;color:var(--primary);background:var(--pbg);padding:2px 8px;border-radius:20px;}
.tt-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:var(--tr);}
.tt-row:last-child{border:none;}
.tt-row:hover,.tt-row:active{background:#f8fafc;}
.tt-row.now{background:var(--pbg);}
.tt-time{font-size:10px;font-weight:700;color:var(--muted);width:44px;flex-shrink:0;line-height:1.4;white-space:pre;}
.tt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tt-info{flex:1;min-width:0;}
.tt-subject{font-size:12px;font-weight:800;}
.tt-cls{font-size:10px;color:var(--muted);margin-top:1px;}
.tt-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.tt-done{background:var(--pbg);color:#15803d;}
.tt-now{background:var(--primary);color:#fff;}
.tt-empty{padding:10px 12px;font-size:11px;color:#94a3b8;font-style:italic;}

/* calendar popup */
.cal-ov{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.cal-ov.show{opacity:1;pointer-events:all;}
.cal-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.94);background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.18);z-index:501;width:min(340px,92vw);padding:20px;transition:transform .22s cubic-bezier(.4,0,.2,1),opacity .22s;opacity:0;pointer-events:none;}
.cal-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:var(--tr);}
.cal-nav:hover{background:var(--pbg);border-color:var(--primary);color:var(--primary);}
.cal-month{font-size:15px;font-weight:800;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:10px;font-weight:700;color:#94a3b8;text-align:center;padding:2px 0 6px;}
.cal-day{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-radius:50%;cursor:pointer;transition:var(--tr);color:var(--text);}
.cal-day:hover{background:var(--pbg);color:var(--primary);}
.cal-day.other{color:#cbd5e1;}
.cal-day.today{background:var(--primary);color:#fff;font-weight:800;}
.cal-day.selected:not(.today){background:var(--pbg);color:var(--primary);font-weight:800;outline:2px solid var(--pbd);}
.cal-day.weekend{color:#94a3b8;}
.cal-day.weekend.today{color:#fff;}
.cal-today-btn{margin-top:14px;width:100%;padding:9px;border-radius:12px;background:var(--pbg);border:1.5px solid var(--pbd);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;color:var(--primary);cursor:pointer;transition:var(--tr);}
.cal-today-btn:hover{background:var(--primary);color:#fff;}

/* bottom sheet */
.bs-ov{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.bs-ov.show{opacity:1;pointer-events:all;}
.bs-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;z-index:501;transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom,0);}
.bs-sheet.open{transform:translateX(-50%) translateY(0);}
.bs-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:10px auto 0;}
.bs-head{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;}
.bs-title{font-size:15px;font-weight:800;}
.bs-close{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.bs-list{padding:4px 12px 16px;display:flex;flex-direction:column;gap:6px;}
.bs-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:var(--tr);}
.bs-item:active{transform:scale(.98);}
.bs-item:hover{border-color:var(--primary);background:var(--pbg);}
.bs-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.bs-item-info{flex:1;}
.bs-item-name{font-size:14px;font-weight:800;}
.bs-item-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.bs-item-arrow{color:#cbd5e1;font-size:16px;}
</style>
</head>

      <img src="classkru-logo.png" alt="ClassKru" style="height:44px;width:auto;">

      <span>ตั้งค่า</span>
    </button>
  </nav>
</div>

<!-- ══ DESKTOP ══ -->
<div class="d-wrap">
  <aside class="d-sidebar">
    <div class="d-sb-logo">
      <img src="classkru-logo.png" alt="ClassKru" style="height:68px;width:auto;">
    </div>
    <div class="d-sb-sec">เมนู</div>
    <div class="d-sb-link active">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>หน้าหลัก
    </div>
    <div class="d-sb-link" onclick="go('overview.html')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>ภาพรวม
    </div>
    <div class="d-sb-link" onclick="go('attendance.html')">

    </div>
    <div class="d-sb-link" onclick="go('settings.html')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>ตั้งค่า
    </div>
    <div class="d-sb-spacer"></div>
    <div class="d-sb-date" id="d-date-sb"></div>
  </aside>
  <div class="d-main">

<div class="toast" id="toast-el"></div>
<script src="ck-service.js"></script>
<script>
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DAYS=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const DAYS_S=['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];
const CAL_MONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const LEVEL_COLORS = CKService.LEVEL_COLORS;
const CK = { fmtKey: CKService.fmtKey, LEVEL_COLORS, CLASSES: [] };

const NOTIF_ICONS={
  yellow:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>`,
  red:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>`,
  blue:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`,
};
const NOTIFS=[
  {type:'yellow',title:'การบ้านรอตรวจ',sub:'8 ชิ้น',action:()=>showToast('ดูการบ้าน')},
  {type:'red',title:'นักเรียนขาดเรียนบ่อย',sub:'3 คน',action:()=>showToast('ดูรายชื่อ')},
  {type:'blue',title:'ประกาศ/แจ้งเตือน',sub:'1 รายการใหม่',action:()=>showToast('ดูประกาศ')},
];

function now(){return new Date();}
function hm(d){return d.getHours()*60+d.getMinutes();}
function pad(n){return String(n).padStart(2,'0');}
function go(url){window.location.href=url;}
function setMNav(el){document.querySelectorAll('.m-bn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function fmtThai(d){return `${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;}
function showToast(msg){
  const t=document.getElementById('toast-el');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
function openNotif(){document.getElementById('notif-panel').classList.add('open');document.getElementById('notif-ov').classList.add('show');}
function closeNotif(){document.getElementById('notif-panel').classList.remove('open');document.getElementById('notif-ov').classList.remove('show');}

function minsUntil(s){return s[0]*60+s[1]-hm(now());}

function buildContent(overrideDate, overridePeriods, overrideChecked){
  const d=overrideDate||now();
  const isToday=CK.fmtKey(d)===CK.fmtKey(now());
  const dow=d.getDay();
  const dateKey=CK.fmtKey(d);
  const periods=overridePeriods||_periods||[];
  const checkedIds=overrideChecked||_checkedIds||[];
  // current/next ใช้ได้เฉพาะวันนี้เท่านั้น
  const t=isToday?hm(now()):-1;
  const current=isToday?periods.find(p=>t>=p.s[0]*60+p.s[1]&&t<p.e[0]*60+p.e[1])||null:null;
  const next=isToday?periods.find(p=>p.s[0]*60+p.s[1]>t)||null:null;
  const dayLabel={1:'วันจันทร์',2:'วันอังคาร',3:'วันพุธ',4:'วันพฤหัสบดี',5:'วันศุกร์'};

  let html=`<div class="date-row" style="margin-bottom:16px">
    <div onclick="openCalendar()" style="cursor:pointer;user-select:none;">
      <div class="date-day">วัน${DAYS[dow]}</div>
      <div class="date-main">${d.getDate()} ${MONTHS[d.getMonth()]}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <div class="date-year">พ.ศ. ${d.getFullYear()+543}</div>
    </div>
    ${isToday
      ? `<div class="now-pill">
          <div class="now-pill-lbl">คาบนี้</div>
          <div class="now-pill-val">${current?current.subject:'ว่าง'}</div>
          ${current?`<div style="font-size:10px;font-weight:700;color:var(--pk);margin-top:1px;">${current.name}</div>`:''}
        </div>`
      : `<div class="now-pill" style="background:#f8fafc;border-color:var(--border);">
          <div class="now-pill-lbl" style="color:var(--muted);">วันที่เลือก</div>
          <div class="now-pill-val" style="color:var(--text);font-size:13px;">${DAYS[dow].slice(0,3)}.</div>
        </div>`
    }
  </div>`;

  // next/current class card — แสดงเฉพาะวันนี้
  if(!isToday){
    // วันอื่น — ไม่แสดง next card
  } else if(dow===0||dow===6){
    // วันหยุด — ไม่แสดง card
  } else if(current){
    const checked=checkedIds.includes(current.periodId);
    const cls=_sections.find(c=>c.id===current.classId)||CK.CLASSES?.find(c=>c.id===current.classId);
    html+=`<div class="next-card" style="margin-bottom:14px">
      <div class="next-card-lbl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px;margin-right:4px"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>คาบปัจจุบัน — กำลังสอนอยู่</div>
      <div class="next-card-body">
        <div class="next-info">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--pbg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
          </div>
          <div>
            <div class="next-name">${current.subject} — ${current.name}</div>
            <div class="next-sub">นักเรียน ${cls?.count||'—'} คน</div>
          </div>
        </div>
        ${checked
          ?'<div style="text-align:center;font-size:13px;font-weight:700;color:var(--primary);padding:4px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px"><path d="M20 6L9 17l-5-5"/></svg>เช็คชื่อแล้ว</div>'
          :`<button class="next-cta" onclick="go('attendance.html?period=${current.periodId}')">เช็คชื่อเลย ›</button>`}
      </div>
    </div>`;
  } else if(next){
    const mins=minsUntil(next.s);
    const lbl=mins<=60?`อีก ${mins} นาที`:`${pad(next.s[0])}:${pad(next.s[1])} น.`;
    const cls=_sections.find(c=>c.id===next.classId)||CK.CLASSES?.find(c=>c.id===next.classId);
    html+=`<div class="next-card" style="margin-bottom:14px">
      <div class="next-card-lbl">คาบถัดไป (${lbl})</div>
      <div class="next-card-body">
        <div class="next-info">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--pbg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
          </div>
          <div>
            <div class="next-name">${next.subject} — ${next.name}</div>
            <div class="next-sub">นักเรียน ${cls?.count||'—'} คน</div>
          </div>
        </div>
        <button class="next-cta" onclick="go('attendance.html?period=${next.periodId}')">เช็คชื่อเลย ›</button>
      </div>
    </div>`;
  } else if(periods.length>0){
    html+=`<div class="next-card" style="margin-bottom:14px"><div class="no-next">✅ เสร็จสิ้นทุกคาบแล้ววันนี้</div></div>`;
  }

  // pending — แสดงเฉพาะวันนี้
  const unchecked=isToday?periods.filter(p=>!checkedIds.includes(p.periodId)):[];
  if(unchecked.length>0){
    html+=`<div class="pending-list" style="margin-bottom:14px">
      <div class="pi pi-orange" onclick="openUncheckedSheet()">
        <div class="pi-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
        </div>
        <div class="pi-info">
          <div class="pi-title">ยังไม่ได้เช็คชื่อ</div>
          <div class="pi-sub">${unchecked.length} คาบ รอการเช็คชื่อ</div>
        </div>
        <span class="pi-arrow">›</span>
      </div>
    </div>`;
  }

  // timetable
  html+=`<div class="tt-wrap">
    <div class="tt-head">
      <div class="tt-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:5px"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>ตารางสอนวันนี้</div>
      <div class="tt-tag">${dayLabel[dow]||'วันหยุด'} · ${periods.length} คาบ</div>
    </div>`;
  if(!periods.length){
    html+=`<div class="tt-empty">วันหยุด — ไม่มีคาบสอน</div>`;
  } else {
    html+=periods.map(p=>{
      const isNow=current&&current.periodId===p.periodId;
      const done=checkedIds.includes(p.periodId);
      const _cls=_sections.find(c=>c.id===p.classId)||CK.CLASSES?.find(c=>c.id===p.classId);
      const _lc=CK.LEVEL_COLORS[_cls?.level||gradeLevel(_cls?.grade||'')||'junior'];
      return `<div class="tt-row${isNow?' now':''}" onclick="go('attendance.html?period=${p.periodId}')">
        <div class="tt-time">${pad(p.s[0])}:${pad(p.s[1])}\n${pad(p.e[0])}:${pad(p.e[1])}</div>
        <div class="tt-dot" style="background:${_lc.icon}"></div>
        <div class="tt-info">
          <div class="tt-subject">${p.subject}</div>
          <div class="tt-cls" style="font-weight:700;color:var(--muted);">${p.name}</div>
        </div>
        ${isNow?'<span class="tt-badge tt-now">กำลังสอน</span>':done?'<span class="tt-badge tt-done"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" style="vertical-align:-1px;margin-right:2px"><path d="M20 6L9 17l-5-5"/></svg>เช็คแล้ว</span>':''}
      </div>`;
    }).join('');
  }
  html+=`</div>`;

  return html;
}

async function renderForDate(date){
  const dow = date.getDay();
  const dateKey = CK.fmtKey(date);
  const periods = await CKService.getTodayPeriods(dow);
  const checkedIds = [];
  for(const p of periods){
    const checked = await CKService.isPeriodChecked(p.classId, dateKey);
    if(checked) checkedIds.push(p.periodId);
  }
  const html=buildContent(date, periods, checkedIds);
  document.getElementById('m-content').innerHTML=html;
  document.getElementById('d-content').innerHTML=html;
  const sb=document.getElementById('d-date-sb');
  if(sb) sb.textContent=fmtThai(date);
}

function render(){
  const html=buildContent();
  const d=now();
  document.getElementById('m-content').innerHTML=html;
  document.getElementById('d-content').innerHTML=html;
  const sb=document.getElementById('d-date-sb');
  if(sb) sb.textContent=fmtThai(d);
  // notif dots
  const show=NOTIFS.length>0;
  document.getElementById('m-notif-dot').style.display=show?'block':'none';
  document.getElementById('d-notif-dot').style.display=show?'block':'none';
  // notif list
  document.getElementById('notif-list').innerHTML=NOTIFS.map(n=>`
    <div class="ni ni-${n.type}">
      <div class="ni-ico">${NOTIF_ICONS[n.type]}</div>
      <div class="ni-info"><div class="ni-title">${n.title}</div><div class="ni-sub">${n.sub}</div></div>
      <span class="ni-arrow">›</span>
    </div>`).join('');
  document.querySelectorAll('.ni').forEach((el,i)=>{el.onclick=NOTIFS[i].action;});
}

/* unchecked sheet */
function openUncheckedSheet(){
  const unchecked=(_periods||[]).filter(p=>!(_checkedIds||[]).includes(p.periodId));
  const list=document.getElementById('uc-list');
  if(!unchecked.length){
    list.innerHTML=`<div style="padding:20px;text-align:center;font-size:14px;font-weight:700;color:#15803d;">เช็คชื่อครบทุกคาบแล้ว ✓</div>`;
  } else {
    list.innerHTML=unchecked.map(p=>{
      const cls=_sections.find(c=>c.id===p.classId)||CK.CLASSES?.find(c=>c.id===p.classId);
      const lc=CK.LEVEL_COLORS[cls?.level||gradeLevel(cls?.grade||'')||'junior'];
      return `<div class="bs-item" onclick="closeUncheckedSheet();go('attendance.html?period=${p.periodId}')">
        <div class="bs-item-dot" style="background:${lc.icon}"></div>
        <div class="bs-item-info">
          <div class="bs-item-name">${p.subject} — ${p.name}</div>
          <div class="bs-item-sub">${pad(p.s[0])}:${pad(p.s[1])}–${pad(p.e[0])}:${pad(p.e[1])} · ${cls?.count||'—'} คน</div>
        </div>
        <span style="font-size:12px;font-weight:700;color:#ea580c;background:#fff7ed;padding:4px 10px;border-radius:8px;">เช็คชื่อ ›</span>
      </div>`;
    }).join('');
  }
  document.getElementById('uc-ov').classList.add('show');
  document.getElementById('uc-sheet').classList.add('open');
}
function closeUncheckedSheet(){
  document.getElementById('uc-ov').classList.remove('show');
  document.getElementById('uc-sheet').classList.remove('open');
}

/* calendar */
let calViewDate=new Date(),calSelected=new Date();
function openCalendar(){calViewDate=new Date(calSelected);renderCal();document.getElementById('cal-ov').classList.add('show');document.getElementById('cal-popup').classList.add('show');}
function closeCalendar(){document.getElementById('cal-ov').classList.remove('show');document.getElementById('cal-popup').classList.remove('show');}
function calNav(dir){calViewDate.setMonth(calViewDate.getMonth()+dir);renderCal();}
function calGoToday(){calSelected=new Date();calViewDate=new Date();renderCal();setTimeout(()=>{closeCalendar();render();},200);}
function calPickDay(y,m,d){calSelected=new Date(y,m,d);renderCal();setTimeout(()=>{closeCalendar();renderForDate(calSelected);},200);}
function renderCal(){
  const y=calViewDate.getFullYear(),mo=calViewDate.getMonth();
  document.getElementById('cal-month-lbl').textContent=`${CAL_MONTHS[mo]} ${y+543}`;
  const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate(),today=new Date();
  const DOWS=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=days;d++){
    const isT=today.getFullYear()===y&&today.getMonth()===mo&&today.getDate()===d;
    const isS=calSelected.getFullYear()===y&&calSelected.getMonth()===mo&&calSelected.getDate()===d;
    const dow=new Date(y,mo,d).getDay();
    const cls=['cal-day',isT?'today':'',isS&&!isT?'selected':'',dow===0||dow===6?'weekend':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="calPickDay(${y},${mo},${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

// ── State (loaded from Supabase) ──
let _periods = [];    // today's schedule from DB
let _sections = [];   // all course_sections
let _checkedIds = []; // checked period ids today

function gradeLevel(grade){
  if(!grade) return 'junior';
  if(grade.startsWith('ป.')) return 'primary';
  const n = parseInt((grade||'').replace('ม.',''));
  if(n <= 3) return 'junior';
  return 'senior';
}

function getLevelColors(level){
  return CK.LEVEL_COLORS[level] || CK.LEVEL_COLORS['junior'];
}

// ── Auth Guard + Load Data ──
(async function(){
  await CKService.requireAuth();

  // โหลดข้อมูลจาก Supabase
  const dow = now().getDay();
  const dateKey = CK.fmtKey(now());

  // load sections ก่อน — ถ้าครูใหม่ (ไม่มีวิชา) แสดง welcome ทันที ไม่ต้องเสียเวลาโหลดต่อ
  _sections = await CKService.loadSections();
  if(!_sections.length){
    const wh = welcomeHtml();
    const mc = document.getElementById('m-content');
    const dc = document.getElementById('d-content');
    if(mc) mc.innerHTML = wh;
    if(dc) dc.innerHTML = wh;
    const sb=document.getElementById('d-date-sb');
    if(sb) sb.textContent=fmtThai(now());
    // notif dots ปิดไว้สำหรับครูใหม่
    document.getElementById('m-notif-dot').style.display='none';
    document.getElementById('d-notif-dot').style.display='none';
    return;
  }

  // มีวิชาแล้ว → โหลดตารางสอน + เช็คชื่อ
  await CKService.loadSchedules();
  _periods = await CKService.getTodayPeriods(dow);

  // ตรวจ checked periods จาก attendance_sessions
  _checkedIds = [];
  for(const p of _periods){
    const checked = await CKService.isPeriodChecked(p.classId, dateKey);
    if(checked) _checkedIds.push(p.periodId);
  }

  render();
})();
