<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ภาพรวมชั้นเรียน — ClassKru</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1d9e75;--pk:#0f6e56;--pbg:#f0fdf4;--pbd:#86efac;
  --bg:#f0f4f8;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --sh:0 1px 4px rgba(0,0,0,.07);
  --tr:all .18s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(15,23,42,.88);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:22px;white-space:nowrap;z-index:9999;transition:transform .25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* WRAP */
.wrap{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:var(--sh);}
.topbar-class{flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar-class-name{font-size:16px;font-weight:800;}
.topbar-class-caret{color:var(--muted);}
.topbar-date{font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;}
.topbar-no-class{font-size:14px;font-weight:700;color:var(--muted);}

/* TAB BAR */
.tab-bar{background:var(--card);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;padding:0 4px;}
.tab-btn{flex:1;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:12px 4px 10px;border:none;background:transparent;color:var(--muted);cursor:pointer;position:relative;transition:color .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .tab-sub{font-size:9px;font-weight:600;opacity:.8;}
.tab-btn.active{color:var(--primary);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2.5px;background:var(--primary);border-radius:2px 2px 0 0;}

/* CONTENT */
.tab-content{display:none;flex:1;overflow-y:auto;padding:12px 12px calc(68px + var(--safe-bottom));flex-direction:column;gap:10px;}
.tab-content.active{display:flex;}
.sec-lbl{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;padding:2px 0 4px;}

/* EMPTY STATE */
.empty-state{background:var(--card);border-radius:18px;padding:32px 20px;text-align:center;border:1.5px dashed var(--border);}
.empty-state-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.empty-state-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.btn-pick{font-family:'Sarabun',sans-serif;font-size:15px;font-weight:800;padding:12px 28px;border-radius:14px;background:var(--primary);color:#fff;border:none;cursor:pointer;transition:var(--tr);box-shadow:0 3px 10px rgba(29,158,117,.3);}
.btn-pick:active{transform:scale(.97);}

/* DATE STRIP */
.date-strip{background:var(--card);border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);}
.ds-left{}
.ds-day{font-size:11px;font-weight:700;color:var(--muted);}
.ds-main{font-size:20px;font-weight:800;display:flex;align-items:center;gap:6px;cursor:pointer;}
.ds-cal{width:20px;height:20px;border-radius:5px;background:var(--pbg);border:1px solid var(--pbd);display:inline-flex;align-items:center;justify-content:center;}
.ds-year{font-size:11px;color:var(--muted);margin-top:1px;}
.now-pill{background:var(--pbg);border:1.5px solid var(--pbd);border-radius:12px;padding:8px 14px;text-align:center;}
.now-pill-lbl{font-size:9px;font-weight:800;color:var(--primary);text-transform:uppercase;}
.now-pill-val{font-size:14px;font-weight:800;color:var(--pk);margin-top:2px;}

/* COMPACT STATS */
.stats-row{display:flex;gap:6px;}
.sr-card{flex:1;background:var(--card);border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--sh);}
.sr-num{font-size:22px;font-weight:800;line-height:1;}
.sr-lbl{font-size:10px;font-weight:700;margin-top:2px;}
.sr-p .sr-num,.sr-p .sr-lbl{color:#15803d;}
.sr-a .sr-num,.sr-a .sr-lbl{color:#dc2626;}
.sr-l .sr-num,.sr-l .sr-lbl{color:#b45309;}
.sr-v .sr-num,.sr-v .sr-lbl{color:#4338ca;}

/* CLASS RESULT CARD */
.rc{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.rc-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;}
.rc-name{font-size:15px;font-weight:800;}
.rc-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.rc-badge-ok{background:var(--pbg);color:#15803d;}
.rc-badge-warn{background:#fffbeb;color:#b45309;}
.rc-badge-none{background:#f1f5f9;color:var(--muted);}
.rc-body{padding:0 14px 12px;}
.rc-mini-stats{display:flex;gap:10px;margin-bottom:0;}
.rc-stat{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;}
.rc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rc-no-data{font-size:12px;color:#94a3b8;font-style:italic;padding:2px 0 6px;}
.rc-btn{width:100%;padding:9px;border-radius:11px;background:#f8fafc;border:1.5px solid var(--border);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;margin-top:10px;transition:var(--tr);}
.rc-btn:active{transform:scale(.98);background:#f1f5f9;}

/* TIMETABLE */
.tt{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.tt-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f1f5f9;}
.tt-title{font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px;}
.tt-tag{font-size:10px;font-weight:700;color:var(--primary);background:var(--pbg);padding:2px 8px;border-radius:20px;}
.tt-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f8fafc;}
.tt-row:last-child{border:none;}
.tt-row.tt-now{background:var(--pbg);}
.tt-time{font-size:10px;font-weight:700;color:var(--muted);width:40px;flex-shrink:0;line-height:1.5;white-space:pre;}
.tt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tt-info{flex:1;}
.tt-subj{font-size:12px;font-weight:800;}
.tt-cls{font-size:10px;color:var(--muted);margin-top:1px;}
.tt-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tt-b-now{background:var(--primary);color:#fff;}
.tt-b-done{background:var(--pbg);color:#15803d;}
.tt-empty{padding:12px 14px;font-size:12px;color:#94a3b8;font-style:italic;}

/* WEEK */
.week-nav{background:var(--card);border-radius:14px;display:flex;align-items:center;padding:6px;box-shadow:var(--sh);}
.wn-btn{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wn-btn:active{background:#f1f5f9;}
.wn-label{flex:1;text-align:center;font-size:12px;font-weight:800;}
.wn-today{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:'Sarabun',sans-serif;}

.week-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:14px;box-shadow:var(--sh);}
.wk-row{border-bottom:1px solid var(--border);overflow:hidden;}
.wk-row:last-child{border-bottom:none;}
.wk-row-head{display:flex;align-items:center;gap:12px;padding:12px 4px;cursor:pointer;transition:background .15s;}
.wk-row-head:active{background:#f8fafc;}
.wk-row-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.wk-row-body.open{max-height:400px;}
.wk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wk-class-name{font-size:15px;font-weight:800;}
.wk-pct{font-size:18px;font-weight:800;}
.wk-bar-track{height:7px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:12px;}
.wk-bar-fill{height:100%;border-radius:99px;transition:width .5s;}
.wk-days{display:flex;gap:4px;}
.wk-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.wk-day-lbl{font-size:9px;font-weight:700;color:#94a3b8;}
.wk-day-dot{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.wd-p{background:#dcfce7;color:#15803d;}
.wd-a{background:#fee2e2;color:#991b1b;}
.wd-l{background:#fef3c7;color:#92400e;}
.wd-n{background:#f1f5f9;color:#94a3b8;}

.wk-mini-stats{display:flex;gap:8px;margin-top:12px;}
.wk-ms{flex:1;text-align:center;padding:8px 4px;background:#f8fafc;border-radius:10px;}
.wk-ms-num{font-size:16px;font-weight:800;}
.wk-ms-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-top:1px;}

/* TERM HEATMAP */
.term-wrap{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.term-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:background .1s;}
.term-row:last-child{border:none;}
.term-row:active{background:#f8fafc;}
.term-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.term-name{font-size:12px;font-weight:700;width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.term-dots{display:flex;flex-wrap:wrap;gap:2px;flex:1;}
.td-p{width:8px;height:8px;border-radius:2px;background:#22c55e;}
.td-l{width:8px;height:8px;border-radius:2px;background:#f59e0b;}
.td-a{width:8px;height:8px;border-radius:2px;background:#ef4444;}
.td-v{width:8px;height:8px;border-radius:2px;background:#6366f1;}
.td-n{width:8px;height:8px;border-radius:2px;background:#e2e8f0;}
.term-info{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:48px;}
.term-pct{font-size:12px;font-weight:800;}
.term-tag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:20px;}
.tag-ok{background:#f0fdf4;color:#15803d;}
.tag-risk{background:#fffbeb;color:#b45309;}
.tag-danger{background:#fef2f2;color:#dc2626;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);height:60px;display:flex;z-index:200;box-shadow:0 -1px 0 rgba(0,0,0,.06);padding-bottom:var(--safe-bottom);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Sarabun',sans-serif;padding:6px 0 4px;}
.bn:active{opacity:.6;}
.bn svg{width:22px;height:22px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bn span{font-size:10px;font-weight:600;color:#9ca3af;}
.bn.active svg{stroke:var(--primary);}
.bn.active span{color:var(--primary);font-weight:700;}

/* BOTTOM SHEET */
.bs-ov{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.bs-ov.show{opacity:1;pointer-events:all;}
.bs-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;z-index:501;transition:transform .28s cubic-bezier(.4,0,.2,1);padding-bottom:var(--safe-bottom);}
.bs-sheet.open{transform:translateX(-50%) translateY(0);}
.bs-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:10px auto 0;}
.bs-head{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;}
.bs-title{font-size:15px;font-weight:800;}
.bs-close{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.bs-list{padding:8px 12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.bs-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 8px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:var(--tr);text-align:center;}
.bs-item:active{transform:scale(.96);}
.bs-item.active{border-color:var(--primary);background:var(--pbg);}
.bs-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bs-item-name{font-size:14px;font-weight:800;}
.bs-item-sub{font-size:10px;color:var(--muted);}
.bs-grp-lbl{grid-column:1/-1;font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;padding:4px 2px 0;}

/* CALENDAR */
.cal-ov{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.cal-ov.show{opacity:1;pointer-events:all;}
.cal-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.94);background:#fff;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.18);z-index:501;width:min(316px,92vw);padding:18px;transition:transform .22s,opacity .22s;opacity:0;pointer-events:none;}
.cal-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-month-lbl{font-size:14px;font-weight:800;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:9px;font-weight:800;color:#94a3b8;text-align:center;padding:2px 0 5px;}
.cal-day{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border-radius:50%;cursor:pointer;transition:var(--tr);}
.cal-day:hover{background:var(--pbg);}
.cal-day.other{color:#cbd5e1;pointer-events:none;}
.cal-day.today{background:var(--primary);color:#fff;font-weight:800;}
.cal-day.selected:not(.today){background:var(--pbg);color:var(--primary);font-weight:800;outline:2px solid var(--pbd);}
.cal-day.weekend{color:#94a3b8;}
.cal-day.weekend.today{color:#fff;}
.cal-today-btn{margin-top:12px;width:100%;padding:8px;border-radius:12px;background:var(--pbg);border:1.5px solid var(--pbd);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;color:var(--primary);cursor:pointer;}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:2px 0 4px;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;}
.leg-dot{width:10px;height:10px;border-radius:3px;}

/* ══════════════════════════════════════
   DESKTOP ≥768px
══════════════════════════════════════ */
@media(min-width:768px){
  /* ซ่อน mobile elements */
  .wrap{display:none !important;}
  .bottom-nav{display:none !important;}
  .bs-ov,.bs-sheet,.cal-ov,.cal-popup{display:none !important;}

  body{overflow:hidden;}

  /* hide mobile wrap, show desktop */
  .wrap{display:none;}
  .d-app{display:flex;height:100vh;overflow:hidden;}

  /* SIDEBAR */
  .d-sidebar{width:260px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;}
  .d-sb-logo{height:96px;display:flex;justify-content:center;align-items:center;border-bottom:1px solid var(--border);}
  .d-sb-sec{padding:14px 16px 4px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
  .d-sb-link{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--tr);border-left:3px solid transparent;text-decoration:none;}
  .d-sb-link:hover{background:#f8fafc;color:var(--text);}
  .d-sb-link.active{background:var(--pbg);color:var(--primary);border-left-color:var(--primary);}
  .d-sb-link svg{width:18px;height:18px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .15s;}
  .d-sb-link.active svg,.d-sb-link:hover svg{stroke:var(--primary);}
  .d-sb-spacer{flex:1;}
  .d-sb-date{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;}

  /* MAIN AREA */
  .d-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* TOPBAR DESKTOP */
  .d-topbar{background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:var(--sh);}
  .d-topbar-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;flex:1;}
  .d-topbar-class{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 14px;border-radius:10px;border:1.5px solid var(--border);background:#fff;transition:var(--tr);}
  .d-topbar-class:hover{border-color:var(--primary);background:var(--pbg);}
  .d-topbar-class-name{font-size:14px;font-weight:800;}

  /* CLASS PILLS DESKTOP */
  .d-class-pills{background:var(--card);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
  .d-class-pills::-webkit-scrollbar{display:none;}
  .d-class-pill{font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:var(--tr);white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .d-class-pill:hover{border-color:#94a3b8;color:var(--text);}
  .d-class-pill.active{border-color:var(--primary);background:var(--pbg);color:var(--primary);}
  .d-cp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* TAB BAR DESKTOP */
  .d-tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:6px;flex-shrink:0;}
  .d-tab-btn{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:10px 20px 8px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:12px;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .d-tab-btn .d-tab-sub{font-size:10px;font-weight:600;opacity:.8;}
  .d-tab-btn:hover{background:#f8fafc;color:var(--text);}
  .d-tab-btn.active{background:var(--primary);color:#fff;}
  .d-tab-btn.active .d-tab-sub{opacity:.85;}

  /* SCROLL AREA */
  .d-scroll{flex:1;overflow-y:auto;padding:24px 32px 40px;}
  .d-content{max-width:800px;}

  /* OVERRIDE COMPONENTS for desktop */
  .date-strip{border-radius:14px;}
  .tt{border-radius:14px;}
  .week-card{border-radius:14px;}
  .term-wrap{border-radius:14px;}
  .stats-row .sr-card{border-radius:12px;padding:14px 10px;}
  .stats-row .sr-num{font-size:28px;}
  .tt-time{width:48px;font-size:11px;}
  .tt-subj{font-size:13px;}
  .tt-cls{font-size:11px;}
  .term-name{font-size:13px;width:120px;}
  .td-p,.td-l,.td-a,.td-v,.td-n{width:10px;height:10px;}
}

@media(max-width:767px){
  .d-app{display:none !important;}
  .d-class-pills{display:none !important;}
  .d-tab-bar{display:none !important;}
  .bottom-nav{display:flex !important;}
  .wrap{display:flex !important;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOPBAR -->
  <div class="topbar">

<script>
/* ══ CONST ══ */
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MONTHS_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DAYS=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const DAYS_S=['อา','จ','อ','พ','พฤ','ศ','ส'];
let CLASSES=CK.CLASSES;
let TIMETABLE=CK.TIMETABLE;
let _ovPeriods = {};    // { dow: [periods] }
let _ovAttend  = {};    // { 'sectionId|dateKey': records }
let _ovStudents= {};    // { sectionId: [students] }

/* ══ STATE ══ */
let currentClass = new URLSearchParams(location.search).get('class') || null;
let viewDate = new Date();
let weekOffset = 0;
let calViewY, calViewM;
let currentTab = 'today';

/* ══ UTILS ══ */
function pad(n){return String(n).padStart(2,'0');}
function fmtKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function hm(d){return d.getHours()*60+d.getMinutes();}
function go(url){location.href=url;}
function showToast(msg){const t=document.getElementById('toast-el');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function getCurrentPeriod(ps){const t=hm(new Date());return ps.find(p=>t>=p.s[0]*60+p.s[1]&&t<p.e[0]*60+p.e[1])||null;}
function getCheckedToday(d){
  // v5: ใช้ CK.getCheckedPeriods — คืน array ของ periodId ที่เช็คครบ
  return CK.getCheckedPeriods(d.getDay(), CK.fmtKey(d));
}
function getMonWeekDates(offset){
  const today=new Date();const mon=new Date(today);
  const day=today.getDay()||7;mon.setDate(today.getDate()-day+1+offset*7);
  return [0,1,2,3,4].map(i=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

/* ══ TOPBAR ══ */
function updateTopbar(){
  const d=new Date();
  const el=document.getElementById('topbar-date');
  if(el) el.textContent=`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
}

/* ══ TAB ══ */
function switchTab(id, btn){
  currentTab=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  renderCurrentTab();
}
function renderCurrentTab(){
  if(currentTab==='today') renderToday();
  else if(currentTab==='weekly'){ buildWeeklyPills(); }
  else if(currentTab==='term') renderTerm();
}

/* ══════════════
   TODAY
══════════════ */
async function renderToday(){
  const d=viewDate;
  const dow=d.getDay();
  const periods=CK.getTodayPeriods(dow);
  const current=getCurrentPeriod(periods);
  const key=fmtKey(d);
  const isToday=fmtKey(new Date())===key;

  // date strip
  document.getElementById('ds-day').textContent='วัน'+DAYS[dow];
  document.getElementById('ds-date').textContent=`${d.getDate()} ${MONTHS[d.getMonth()]}`;
  document.getElementById('ds-year').textContent='พ.ศ. '+(d.getFullYear()+543);
  document.getElementById('now-pill-val').textContent=isToday?(current?current.subject:'ว่าง'):'—';

  const el=document.getElementById('today-period-cards');
  if(!el) return;

  if(dow===0||dow===6){
    el.innerHTML=`<div style="padding:20px;background:#fff;border-radius:16px;border:1.5px solid var(--border);text-align:center;color:var(--muted);font-size:14px;font-weight:600;">วันหยุด — ไม่มีคาบสอน</div>`;
    return;
  }
  if(!periods.length){
    el.innerHTML=`<div style="padding:16px;background:#fff;border-radius:16px;border:1.5px dashed var(--border);text-align:center;color:var(--muted);font-size:13px;">ไม่มีคาบสอนวันนี้</div>`;
    return;
  }

  // async render
  const cardsData = await Promise.all(periods.map(async p=>{
    const cls=CLASSES.find(c=>c.id===p.classId);
    const st = await CK.getStudents(p.classId);
    const records = await CK.getAttendance(p.classId, key);
    const hasData=Object.keys(records).length>0;
    let present=0,absent=0,late=0,leave=0;
    st.forEach(s=>{const r=records[s.id];if(!r)return;if(r.status==='present')present++;else if(r.status==='absent')absent++;else if(r.status==='late')late++;else if(r.status==='leave')leave++;});
    const total=cls?.count||st.length;
    const pct=total>0?Math.round(present/total*100):0;
    const barColor=pct>=80?'#16a34a':pct>=60?'#d97706':'#dc2626';
    const isNow=isToday&&current&&current.periodId===p.periodId;
    const isChecked=hasData;
    const lc=CK.LEVEL_COLORS[cls?.level||'junior'];
    return {p,cls,st,present,absent,late,leave,total,pct,barColor,isNow,isChecked,lc};
  }));

  el.innerHTML=cardsData.map(({p,cls,present,absent,late,leave,total,pct,barColor,isNow,isChecked,lc})=>{

    return `<div style="background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1.5px solid ${isNow?'var(--primary)':'var(--border)'};cursor:pointer;margin-bottom:0;" onclick="go('attendance.html?period=${p.periodId}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${lc.icon};flex-shrink:0;"></div>
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text);">${p.subject}</div>
            <div style="font-size:12px;font-weight:700;color:var(--primary);margin-top:1px;">${p.name}${isNow?' · <span style="font-size:10px;font-weight:800;background:var(--primary);color:#fff;padding:2px 6px;border-radius:20px;">กำลังสอน</span>':''}</div>
          </div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${barColor};">${pct}%</div>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;">${pad(p.s[0])}:${pad(p.s[1])}–${pad(p.e[0])}:${pad(p.e[1])}</div>
      <div style="background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden;margin-bottom:10px;">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:99px;transition:width .4s;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;">
        <div><div style="font-size:20px;font-weight:800;color:#15803d;">${present}</div><div style="font-size:10px;color:var(--muted);">มา</div></div>
        <div><div style="font-size:20px;font-weight:800;color:#dc2626;">${absent}</div><div style="font-size:10px;color:var(--muted);">ขาด</div></div>
        <div><div style="font-size:20px;font-weight:800;color:#d97706;">${late}</div><div style="font-size:10px;color:var(--muted);">สาย</div></div>
        <div><div style="font-size:20px;font-weight:800;color:#4338ca;">${leave}</div><div style="font-size:10px;color:var(--muted);">ลา</div></div>
      </div>
    </div>`;
  }).join('');
}

async function renderTodayTimetable(periods, current, checked, highlightClassId){
  const ttEl=document.getElementById('today-tt');
  const dayLabel={1:'วันจันทร์',2:'วันอังคาร',3:'วันพุธ',4:'วันพฤหัสบดี',5:'วันศุกร์'};
  const dow=viewDate.getDay();
  let html=`<div class="tt-head"><div class="tt-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>ตารางสอนวันนี้</div><div class="tt-tag">${dayLabel[dow]||'วันหยุด'} · ${periods.length} คาบ</div></div>`;
  if(periods.length===0){
    html+=`<div class="tt-empty">วันหยุด — ไม่มีคาบสอน</div>`;
  } else {
    html+=periods.map(p=>{
      // v5: match ด้วย periodId
      const isNow=current&&current.periodId===p.periodId;
      const done=checked.includes(p.periodId);
      const isHL=highlightClassId&&p.classId===highlightClassId;
      const opacity=highlightClassId&&!isHL?'opacity:.4;':'';
      const _ttCls=CLASSES.find(c=>c.id===p.classId)||CK.CLASSES?.find(c=>c.id===p.classId);
      const _grade=_ttCls?.grade||_ttCls?.name||'';
      const _level=_ttCls?.level||(_grade.startsWith('ป.')?'primary':'junior');
      const _ttLc=CK.LEVEL_COLORS[_level]||CK.LEVEL_COLORS['junior'];
      return `<div class="tt-row ${isNow?'tt-now':''}" style="${opacity}cursor:pointer;" onclick="go('attendance.html?period=${p.periodId}')">
        <div class="tt-time">${pad(p.s[0])}:${pad(p.s[1])}\n${pad(p.e[0])}:${pad(p.e[1])}</div>
        <div class="tt-dot" style="background:${_ttLc.icon}"></div>
        <div class="tt-info">
          <div class="tt-subj">${p.subject}</div>
          <div class="tt-cls">${p.name}</div>
        </div>
        ${isNow?'<span class="tt-badge tt-b-now">กำลังสอน</span>':done?'<span class="tt-badge tt-b-done">เช็คแล้ว</span>':''}
      </div>`;
    }).join('');
  }
  ttEl.innerHTML=html;
}

function openSubjectSheet(){
  const pad2=n=>String(n).padStart(2,'0');
  // unique วิชา+ห้อง (ไม่ซ้ำข้ามวัน) — ใช้ subject+classId เป็น key
  const seen=new Set(); const items=[];
  [1,2,3,4,5].forEach(dow=>{
    CK.getTodayPeriods(dow).forEach(p=>{
      const key=p.subject+'|'+p.classId;
      if(!seen.has(key)){ seen.add(key); items.push(p); }
    });
  });
  items.sort((a,b)=>a.subject.localeCompare(b.subject,'th')||a.classId.localeCompare(b.classId));
  const list=document.getElementById('cs-list');
  list.innerHTML=items.map(p=>{
    const cls=CLASSES.find(c=>c.id===p.classId);
    const lc=CK.LEVEL_COLORS[cls?.level||'junior'];
    const active=p.periodId===currentPeriodId;
    return `<div style="display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;border:1.5px solid ${active?lc.border:'var(--border)'};background:${active?lc.bg:'#fff'};cursor:pointer;margin-bottom:8px;" onclick="selectPeriod('${p.periodId}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${lc.icon};flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;">${p.subject} — ${cls?.name||p.classId}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${pad2(p.s[0])}:${pad2(p.s[1])}–${pad2(p.e[0])}:${pad2(p.e[1])} · ${cls?.count||'—'} คน</div>
      </div>
      ${active?`<span style="color:${lc.icon};font-size:16px;font-weight:800;">✓</span>`:`<span style="font-size:12px;font-weight:700;color:#ea580c;background:#fff7ed;padding:4px 10px;border-radius:8px;">เลือก</span>`}
    </div>`;
  }).join('');
  document.getElementById('cs-sheet-title').textContent='เลือกวิชา';
  document.getElementById('cs-ov').classList.add('show');
  document.getElementById('cs-sheet').classList.add('open');
}

function buildWeeklyPills(){
  const seen=new Set(); const items=[];
  [1,2,3,4,5].forEach(dow=>{
    CK.getTodayPeriods(dow).forEach(p=>{
      const key=p.subject+'|'+p.classId;
      if(!seen.has(key)){ seen.add(key); items.push(p); }
    });
  });
  items.sort((a,b)=>a.subject.localeCompare(b.subject,'th')||a.classId.localeCompare(b.classId));

  const el=document.getElementById('wk-list');
  if(!el) return;

  el.innerHTML=`<div style="background:var(--card);border-radius:16px;border:1.5px solid var(--border);box-shadow:var(--sh);overflow:hidden;">
    ${items.map((p,i)=>{
      const cls=CLASSES.find(c=>c.id===p.classId);
      const lc=CK.LEVEL_COLORS[cls?.level||'junior'];
      const active=p.periodId===currentPeriodId;
      return `<div class="wk-row" id="wkrow-${p.periodId}">
        <div class="wk-row-head" onclick="toggleWeekRow('${p.periodId}')">
          <div style="width:8px;height:8px;border-radius:50%;background:${lc.icon};flex-shrink:0;"></div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:800;color:var(--text);">${p.subject}</div>
            <div style="font-size:12px;color:${lc.text};font-weight:700;">${cls?.name||p.classId}</div>
          </div>
          <svg id="wkarrow-${p.periodId}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" style="transition:transform .3s;${active?'transform:rotate(180deg);':''}"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="wk-row-body${active?' open':''}" id="wkbody-${p.periodId}">
          <div style="padding:0 4px 14px;" id="wkcontent-${p.periodId}">
            ${active?buildWeekCard(p):''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function toggleWeekRow(periodId){
  const wasOpen = currentPeriodId===periodId;
  // ปิดทั้งหมด
  document.querySelectorAll('.wk-row-body').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('[id^="wkarrow-"]').forEach(el=>el.style.transform='');
  if(!wasOpen){
    currentPeriodId=periodId;
    const body=document.getElementById('wkbody-'+periodId);
    const content=document.getElementById('wkcontent-'+periodId);
    const arrow=document.getElementById('wkarrow-'+periodId);
    if(content && !content.innerHTML.trim()) content.innerHTML=buildWeekCard(CK.getPeriod(periodId));
    if(body) body.classList.add('open');
    if(arrow) arrow.style.transform='rotate(180deg)';
    setTimeout(()=>body?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
  } else {
    currentPeriodId=null;
  }
}

function buildWeekCard(p){
  if(!p) return '';
  const cls=CLASSES.find(c=>c.id===p.classId);
  const lc=CK.LEVEL_COLORS[cls?.level||'junior'];
  const st=CK.getStudents(p.classId);
  const dates=getMonWeekDates(weekOffset);
  const keys=dates.map(d=>fmtKey(d));
  const f=dates[0],l=dates[4];
  const weekLabel=`${f.getDate()} ${MONTHS[f.getMonth()]} – ${l.getDate()} ${MONTHS[l.getMonth()]} ${f.getFullYear()+543}`;

  let totP=0,totA=0,totL=0,totV=0,totAll=0;
  keys.forEach(k=>{
    const records=CK.getAttendance(p.periodId,k);
    const hasData=Object.keys(records).length>0;
    st.forEach(s=>{
      const r=hasData?records[s.id]:s.history[k];
      if(!r)return; totAll++;
      if(r.status==='present')totP++;
      else if(r.status==='absent')totA++;
      else if(r.status==='late')totL++;
      else totV++;
    });
  });
  const pct=totAll>0?Math.round(totP/totAll*100):0;
  const barColor=pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';

  const dayDots=dates.map((d,i)=>{
    const dow=d.getDay();
    if(dow===0||dow===6) return '';
    const hasThisDay=CK.getTodayPeriods(dow).some(pd=>pd.periodId===p.periodId);
    if(!hasThisDay) return `<div class="wk-day"><div class="wk-day-lbl">${DAYS_S[dow]}</div><div class="wk-day-dot wd-n" style="opacity:.25;">—</div></div>`;
    const k=keys[i];
    const records=CK.getAttendance(p.periodId,k);
    const hasData=Object.keys(records).length>0;
    let dp=0,da=0,dl=0;
    st.forEach(s=>{
      const r=hasData?records[s.id]:s.history[k];
      if(!r)return;
      if(r.status==='present')dp++;
      else if(r.status==='absent')da++;
      else if(r.status==='late')dl++;
    });
    const total=dp+da+dl;
    let dotCls='wd-n',lbl='—';
    if(total>0){
      if(da===0&&dl===0){dotCls='wd-p';lbl=`${dp}`;}
      else if(da>0){dotCls='wd-a';lbl=`${da}ข`;}
      else{dotCls='wd-l';lbl=`${dl}ส`;}
    }
    return `<div class="wk-day"><div class="wk-day-lbl">${DAYS_S[dow]}</div><div class="wk-day-dot ${dotCls}">${lbl}</div></div>`;
  }).join('');

  return `<div style="border-top:1px solid var(--border);padding-top:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-size:11px;color:var(--muted);">${weekLabel}</div>
      <div style="font-size:16px;font-weight:800;color:${barColor};">${pct}%</div>
    </div>
    <div class="wk-bar-track"><div class="wk-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
      <span style="font-size:13px;font-weight:700;color:#15803d;display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;"></span>มา ${totP} ครั้ง</span>
      <span style="font-size:13px;font-weight:700;color:#b45309;display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>สาย ${totL} ครั้ง</span>
      <span style="font-size:13px;font-weight:700;color:#dc2626;display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>ขาด ${totA} ครั้ง</span>
      <span style="font-size:13px;font-weight:700;color:#4338ca;display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#6366f1;display:inline-block;"></span>ลา ${totV} ครั้ง</span>
    </div>
  </div>`;
}

function selectPeriod(periodId){ toggleWeekRow(periodId); }
function buildWeeklySubjectPills(){ buildWeeklyPills(); }

function renderTerm(){
  const hasClass=!!currentClass;
  document.getElementById('term-no-class').style.display=hasClass?'none':'block';
  document.getElementById('term-has-class').style.display=hasClass?'flex':'none';
  if(!hasClass) return;

  const cls=CLASSES.find(c=>c.id===currentClass);
  document.getElementById('term-lbl').textContent=`${cls?.name||currentClass} — Heatmap 60 วัน`;

  const today=new Date();
  const days=[];
  for(let i=59;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    if(d.getDay()===0||d.getDay()===6) continue;
    days.push(fmtKey(d));
  }

  const st=CK.getStudents(currentClass);
  const rows=st.map(s=>{
    const stats=CK.getStudentAttendStats(s);
    const pct=stats.total>0?Math.round(stats.present/stats.total*100):0;
    const tag=stats.overLimit?'tag-danger':stats.riskLevel==='warning'?'tag-risk':'tag-ok';
    const tagLbl=stats.overLimit?'เสี่ยงสูง':stats.riskLevel==='warning'?'เริ่มเสี่ยง':'ปกติ';
    const pctColor=pct>=80?'#15803d':pct>=60?'#b45309':'#dc2626';
    const dots=days.map(k=>{
      const r=s.history[k];
      if(!r) return `<div class="td-n"></div>`;
      const c={present:'td-p',late:'td-l',absent:'td-a',leave:'td-v'}[r.status]||'td-n';
      return `<div class="${c}"></div>`;
    }).join('');
    return `<div class="term-row" onclick="go('student.html?class=${currentClass}&id=${s.id}')">
      <div class="term-av" style="background:${s.col.bg};color:${s.col.c}">${s.fn[0]}</div>
      <div class="term-name">${s.fn} ${s.ln}</div>
      <div class="term-dots">${dots}</div>
      <div class="term-info">
        <div class="term-pct" style="color:${pctColor}">${pct}%</div>
        <span class="term-tag ${tag}">${tagLbl}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('term-content').innerHTML=rows;
}

function openClassSheet(){
  const list=document.getElementById('cs-list');

  // tab วันนี้ = โชว์เฉพาะห้องที่มีคาบวันนั้น, อื่นๆ = ทุกห้อง
  const activeTab = currentTab || dCurrentTab || 'today';
  let pool;
  if(activeTab==='today'){
    const dow=viewDate.getDay();
    const todayIds=new Set((TIMETABLE[dow]||[]).map(p=>p.classId));
    pool=sortedClasses(CLASSES.filter(c=>todayIds.has(c.id)));
    const titleEl=document.getElementById('cs-sheet-title');
    if(titleEl) titleEl.textContent=`ห้องที่สอนวันนี้ (${pool.length} ห้อง)`;
  } else {
    pool=sortedClasses(CLASSES);
    const titleEl=document.getElementById('cs-sheet-title');
    if(titleEl) titleEl.textContent='เลือกห้องเรียน';
  }

  function renderPill(c){
    const lc=CK.LEVEL_COLORS[c.level||'junior'];
    const isActive=c.id===currentClass;
    return `<div class="bs-item ${isActive?'active':''}" onclick="selectClass('${c.id}')"
      style="${isActive?`border-color:${lc.icon};background:${lc.bg};`:''}">
      <div class="bs-item-dot" style="background:${lc.icon}"></div>
      <div class="bs-item-name" style="color:${lc.text}">${c.name}</div>
      <div class="bs-item-sub">${c.count} คน${isActive?' ✓':''}</div>
    </div>`;
  }
  list.innerHTML=pool.map(renderPill).join('');
  document.getElementById('cs-ov').classList.add('show');
  document.getElementById('cs-sheet').classList.add('open');
}
function closeClassSheet(){
  document.getElementById('cs-ov').classList.remove('show');
  document.getElementById('cs-sheet').classList.remove('open');
}
function selectClass(id){
  currentClass=id;
  closeClassSheet();
  updateTopbar();
  renderCurrentTab();
}

function openCal(){
  calViewY=viewDate.getFullYear();calViewM=viewDate.getMonth();
  renderCal();
  document.getElementById('cal-ov').classList.add('show');
  document.getElementById('cal-popup').classList.add('show');
}
function closeCal(){
  document.getElementById('cal-ov').classList.remove('show');
  document.getElementById('cal-popup').classList.remove('show');
}
function calNav(dir){
  calViewM+=dir;
  if(calViewM<0){calViewM=11;calViewY--;}
  if(calViewM>11){calViewM=0;calViewY++;}
  renderCal();
}
function calToday(){viewDate=new Date();closeCal();renderToday();}
function calPick(y,m,d){
  viewDate=new Date(y,m,d);renderCal();
  setTimeout(()=>{closeCal();renderToday();},160);
}
function renderCal(){
  document.getElementById('cal-month-lbl').textContent=`${MONTHS_FULL[calViewM]} ${calViewY+543}`;
  const today=new Date();
  const firstDay=new Date(calViewY,calViewM,1).getDay();
  const daysInM=new Date(calViewY,calViewM+1,0).getDate();
  const DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=daysInM;d++){
    const isT=today.getFullYear()===calViewY&&today.getMonth()===calViewM&&today.getDate()===d;
    const isS=viewDate.getFullYear()===calViewY&&viewDate.getMonth()===calViewM&&viewDate.getDate()===d;
    const dow=new Date(calViewY,calViewM,d).getDay();
    const cls=['cal-day',isT?'today':'',isS&&!isT?'selected':'',dow===0||dow===6?'weekend':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="calPick(${calViewY},${calViewM},${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

let dCurrentTab = 'today';

function dSwitchTab(id, btn){
  dCurrentTab = id;
  document.querySelectorAll('.d-tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildDClassPills(); // rebuild pills ตาม tab
  dRender();
}

// เรียง ป.1→ป.6→ม.1→ม.3 เสมอ
const CLASS_ORDER = ['p11','p21','p31','p41','p51','p61','m11','m21','m22','m31','m32'];
function sortedClasses(list){
  return [...list].sort((a,b)=>CLASS_ORDER.indexOf(a.id)-CLASS_ORDER.indexOf(b.id));
}

function buildDClassPills(){
  const el = document.getElementById('d-class-pills');
  if(!el) return;

  // tab วันนี้ = เฉพาะห้องที่มีคาบวันนั้น, อื่นๆ = ทุกห้อง
  const dow = viewDate.getDay();
  const todayIds = new Set((TIMETABLE[dow]||[]).map(p=>p.classId));
  const pool = (dCurrentTab==='today')
    ? sortedClasses(CLASSES.filter(c=>todayIds.has(c.id)))
    : sortedClasses(CLASSES);

  // ถ้าห้องที่เลือกไม่อยู่ใน pool วันนี้ ให้ reset
  if(dCurrentTab==='today' && currentClass && !todayIds.has(currentClass)){
    currentClass = pool[0]?.id || null;
    updateTopbar(); updateDTopbar();
  }

  el.innerHTML = pool.map(c=>{
    const lc = CK.LEVEL_COLORS[c.level||'junior'];
    const isActive = c.id === currentClass;
    return `<button class="d-class-pill ${isActive?'active':''}" onclick="selectClass('${c.id}')"
      style="${isActive?`border-color:${lc.icon};color:${lc.text};background:${lc.bg};`:''}">
      <span class="d-cp-dot" style="background:${lc.icon}"></span>${c.name}
    </button>`;
  }).join('');
}

function updateDTopbar(){
  const el = document.getElementById('d-topbar-class-name');
  const sbDate = document.getElementById('d-sb-date');
  if(sbDate){const d=new Date();sbDate.textContent=`วัน${DAYS[d.getDay()]}ที่ ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;}
  if(!el) return;
  if(currentClass){
    const cls = CLASSES.find(c=>c.id===currentClass);
    const lc = CK.LEVEL_COLORS[cls?.level||'junior'];
    el.textContent = cls?.name || currentClass;
    el.style.color = lc.text;
  } else {
    el.textContent = 'เลือกห้อง';
    el.style.color = '#64748b';
  }
}

function dRender(){
  const el = document.getElementById('d-content');
  if(!el) return;
  if(dCurrentTab === 'today') el.innerHTML = buildDToday();
  else if(dCurrentTab === 'weekly') el.innerHTML = buildDWeekly();
  else if(dCurrentTab === 'term') el.innerHTML = buildDTerm();
}

/* ─── desktop: วันนี้ ─── */
function buildDToday(){
  const d = viewDate;
  const dow = d.getDay();
  const periods = TIMETABLE[dow]||[];
  const current = getCurrentPeriod(periods);
  const checked = getCheckedToday(d);

  // date strip
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);">วัน${DAYS[dow]}</div>
      <div style="font-size:24px;font-weight:800;display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="openCal()">
        ${d.getDate()} ${MONTHS[d.getMonth()]}

      if(hasData){

  // alerts — นักเรียนที่ต้องติดตาม
  if(currentClass){

    const alerts = buildAlerts(st, key);

/* ─── build alerts (shared logic) ─── */
function buildAlerts(students, dk){
  const alerts=[];
  students.forEach(s=>{
    const stats=CK.getStudentAttendStats(s);
    const reasons=[];
    let level='warning';
    if(stats.overLimit){reasons.push(`ขาด+ลา ${stats.miss} วัน (เกินเกณฑ์ ${CK.MAX_ABSENT} วัน)`);level='danger';}
    const consecAbsent=getConsecAbsent(s,dk);
    if(consecAbsent>=2){reasons.push(`ขาดติดกัน ${consecAbsent} วัน`);if(consecAbsent>=3)level='danger';}
    if(stats.total>0){const pct=Math.round(stats.present/stats.total*100);if(pct<80)reasons.push(`มาเรียน ${pct}% (ต่ำกว่า 80%)`);}
    if(reasons.length>0){
      const tag=level==='danger'?'เสี่ยงสูง':consecAbsent>=2?'ขาดติดกัน':'ต้องติดตาม';
      alerts.push({student:s,reason:reasons[0],tag,level});
    }
  });
  return alerts.sort((a,b)=>a.level==='danger'&&b.level!=='danger'?-1:1);
}
function getConsecAbsent(student,fromKey){
  const keys=Object.keys(student.history).sort((a,b)=>b.localeCompare(a));
  let consec=0;
  for(const k of keys){
    if(k>fromKey)continue;
    const s=student.history[k].status;
    if(s==='absent'||s==='leave')consec++;
    else break;
  }
  return consec;
}

/* ─── desktop: สัปดาห์ ─── */
function buildDWeekly(){
  if(!currentClass) return `<div style="padding:40px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);">เลือกห้องเรียนก่อน</div>`;
  const dates = getMonWeekDates(weekOffset);
  const keys = dates.map(d=>fmtKey(d));
  const f=dates[0],l=dates[4];
  const cls = CLASSES.find(c=>c.id===currentClass);
  const lc = CK.LEVEL_COLORS[cls?.level||'junior'];
  const st = CK.getStudents(currentClass);
  let totP=0,totA=0,totL=0,totV=0,totAll=0;
  keys.forEach(k=>st.forEach(s=>{const r=s.history[k];if(!r)return;totAll++;if(r.status==='present')totP++;else if(r.status==='absent')totA++;else if(r.status==='late')totL++;else totV++;}));
  const pct = totAll>0?Math.round(totP/totAll*100):0;
  const barColor = pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
  const dayDots = dates.map((d,i)=>{
    const key=keys[i];let dp=0,da=0,dl=0,dn=0;
    st.forEach(s=>{const r=s.history[key];if(!r){dn++;return;}if(r.status==='present')dp++;else if(r.status==='absent')da++;else if(r.status==='late')dl++;});
    const total=dp+da+dl;let dotCls='wd-n',lbl='—';
    if(total>0){if(da===0&&dl===0){dotCls='wd-p';lbl=`${dp}`;}else if(da>0){dotCls='wd-a';lbl=`${da}ข`;}else{dotCls='wd-l';lbl=`${dl}ส`;}}
    return `<div class="wk-day"><div class="wk-day-lbl">${DAYS_S[d.getDay()]}</div><div class="wk-day-dot ${dotCls}">${lbl}</div></div>`;
  }).join('');

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
    <div class="week-nav" style="flex:1;min-width:280px;">
      <button class="wn-btn" onclick="changeWeek(-1);dRender()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="wn-label">${f.getDate()} ${MONTHS[f.getMonth()]} – ${l.getDate()} ${MONTHS[l.getMonth()]} ${f.getFullYear()+543}</div>
      <button class="wn-btn" onclick="changeWeek(1);dRender()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
      <button class="wn-today" onclick="weekOffset=0;dRender()">สัปดาห์นี้</button>
    </div>
  </div>
  <div class="week-card">
    <div class="wk-top"><div class="wk-class-name" style="color:${lc.text}">${cls?.name}</div><div class="wk-pct" style="color:${barColor}">${pct}%</div></div>
    <div class="wk-bar-track"><div class="wk-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="wk-days">${dayDots}</div>
    <div class="wk-mini-stats">
      <div class="wk-ms"><div class="wk-ms-num" style="color:#15803d">${totP}</div><div class="wk-ms-lbl">มา</div></div>
      <div class="wk-ms"><div class="wk-ms-num" style="color:#dc2626">${totA}</div><div class="wk-ms-lbl">ขาด</div></div>
      <div class="wk-ms"><div class="wk-ms-num" style="color:#b45309">${totL}</div><div class="wk-ms-lbl">สาย</div></div>
      <div class="wk-ms"><div class="wk-ms-num" style="color:#4338ca">${totV}</div><div class="wk-ms-lbl">ลา</div></div>
    </div>
  </div>`;
}

/* ─── desktop: ทั้งเทอม ─── */
function buildDTerm(){
  if(!currentClass) return `<div style="padding:40px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);">เลือกห้องเรียนก่อน</div>`;
  const cls = CLASSES.find(c=>c.id===currentClass);
  const today = new Date();
  const days = [];
  for(let i=59;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);if(d.getDay()===0||d.getDay()===6)continue;days.push(fmtKey(d));}
  const st = CK.getStudents(currentClass);
  const rows = st.map(s=>{
    const stats = CK.getStudentAttendStats(s);
    const pct = stats.total>0?Math.round(stats.present/stats.total*100):0;
    const tag = stats.overLimit?'tag-danger':stats.riskLevel==='warning'?'tag-risk':'tag-ok';
    const tagLbl = stats.overLimit?'เสี่ยงสูง':stats.riskLevel==='warning'?'เริ่มเสี่ยง':'ปกติ';
    const pctColor = pct>=80?'#15803d':pct>=60?'#b45309':'#dc2626';
    const dots = days.map(k=>{const r=s.history[k];if(!r)return`<div class="td-n"></div>`;const c={present:'td-p',late:'td-l',absent:'td-a',leave:'td-v'}[r.status]||'td-n';return`<div class="${c}"></div>`;}).join('');
    return `<div class="term-row" onclick="go('student.html?class=${currentClass}&id=${s.id}')">
      <div class="term-av" style="background:${s.col.bg};color:${s.col.c}">${s.fn[0]}</div>
      <div class="term-name">${s.fn} ${s.ln}</div>
      <div class="term-dots">${dots}</div>
      <div class="term-info"><div class="term-pct" style="color:${pctColor}">${pct}%</div><span class="term-tag ${tag}">${tagLbl}</span></div>
    </div>`;
  }).join('');
  return `
  <div class="legend" style="margin-bottom:6px;">
    <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>มาเรียน</div>
    <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>มาสาย</div>
    <div class="leg"><div class="leg-dot" style="background:#ef4444"></div>ขาด</div>
    <div class="leg"><div class="leg-dot" style="background:#6366f1"></div>ลา</div>
    <div class="leg"><div class="leg-dot" style="background:#e2e8f0"></div>ไม่มีข้อมูล</div>
  </div>
  <div class="sec-lbl">${cls?.name} — Heatmap 60 วัน (คลิกชื่อเพื่อดูโปรไฟล์)</div>
  <div class="term-wrap">${rows}</div>`;
}

/* ══ INIT ══ */
(async function(){
  await CKService.requireAuth();

  // โหลด Supabase data
  await CKService.loadSchedules();
  const sbSections = await CKService.loadSections();
  if(sbSections && sbSections.length > 0){
    CLASSES = sbSections;
  }

  // โหลด periods ทุกวัน
  for(let dow=1; dow<=5; dow++){
    _ovPeriods[dow] = await CKService.getTodayPeriods(dow);
  }

  // Override CK functions
  const _origGetStudents = CK.getStudents.bind(CK);
  CK.getStudents = async function(sectionId){
    if(_ovStudents[sectionId]) return _ovStudents[sectionId];
    const students = await CKService.getStudents(sectionId);
    _ovStudents[sectionId] = students || [];
    return _ovStudents[sectionId];
  };

  CK.getTodayPeriods = function(dow){
    return _ovPeriods[dow] || CK._origGetTodayPeriods?.(dow) || [];
  };

  CK.getAttendance = async function(sectionId, dateKey){
    const key = `${sectionId}|${dateKey}`;
    if(_ovAttend[key]) return _ovAttend[key];
    const records = await CKService.getAttendance(sectionId, dateKey);
    _ovAttend[key] = records || {};
    return _ovAttend[key];
  };

  CK.isPeriodChecked = async function(sectionId, dateKey){
    const records = await CK.getAttendance(sectionId, dateKey);
    return Object.keys(records).length > 0;
  };

  updateTopbar();
  updateDTopbar();
  buildDClassPills();
  renderToday();
  dRender();
})();
</script>
