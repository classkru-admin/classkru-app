<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>งานที่มอบหมาย — ClassKru</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1d9e75;--pk:#0f6e56;--pbg:#f0fdf4;--pbd:#86efac;
  --bg:#f5f7fa;--card:#fff;--text:#0f172a;--muted:#5b6675;--border:#e8edf2;
  --sh:0 1px 4px rgba(0,0,0,.07);--sh-md:0 4px 14px rgba(0,0,0,.10);
  --tr:all .18s cubic-bezier(.4,0,.2,1);
  --sidebar:260px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.btn{font-family:'Sarabun',sans-serif;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:var(--tr);border-radius:12px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--primary);color:#fff;font-size:14px;padding:9px 18px;}
.btn-primary:hover{background:var(--pk);}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);font-size:13px;padding:7px 14px;}
.btn-outline:hover{border-color:#94a3b8;}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:10px;}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(15,23,42,.88);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:22px;white-space:nowrap;z-index:9999;transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:var(--sh);}
.sb-logo{display:flex;justify-content:center;align-items:center;height:96px;border-bottom:1px solid var(--border);}
.sb-nav-sec{padding:14px 14px 4px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
.sb-link{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--tr);border-left:3px solid transparent;}
.sb-link:hover{background:#f8fafc;color:var(--text);}
.sb-link.active{background:var(--pbg);color:var(--primary);border-left-color:var(--primary);}
.sb-link .ico{width:22px;display:flex;align-items:center;justify-content:center;}
.sb-link .ico svg{width:18px;height:18px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.sb-link.active .ico svg,.sb-link:hover .ico svg{stroke:var(--primary);}
.sb-spacer{flex:1;}
.sb-date{padding:12px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--sh);}
.topbar-title{font-size:16px;font-weight:800;flex:1;display:flex;align-items:center;gap:8px;}
.content{padding:28px 40px 60px;display:flex;flex-direction:column;gap:20px;max-width:960px;}

/* CLASS TABS */
.class-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.class-tab{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:6px 18px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:var(--tr);}
.class-tab:hover{border-color:#94a3b8;color:var(--text);}
.class-tab.active{border-color:var(--primary);background:var(--pbg);color:var(--primary);}

/* ASSIGNMENT CARDS */
.assign-grid{display:flex;flex-direction:column;gap:12px;}
.assign-card{background:#fff;border-radius:18px;border:1.5px solid var(--border);box-shadow:var(--sh);overflow:hidden;transition:var(--tr);}
.assign-card:hover{box-shadow:var(--sh-md);}
.assign-card.overdue{border-color:#fca5a5;}

.assign-head{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.assign-head-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.assign-name{font-size:15px;font-weight:800;color:var(--text);}
.assign-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.assign-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}

/* progress */
.prog-wrap{height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden;width:100px;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s;}
.prog-lbl{font-size:11px;font-weight:800;}

.type-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
.tb-exam{background:#fef2f2;color:#dc2626;}
.tb-hw{background:#eff6ff;color:#1d4ed8;}
.tb-project{background:#fdf4ff;color:#7e22ce;}
.tb-quiz{background:#f0fdf4;color:#15803d;}
.overdue-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:#fef2f2;color:#dc2626;}

/* expanded detail — student list */
.assign-detail{display:none;border-top:1px solid #f1f5f9;}
.assign-detail.open{display:block;}
.detail-head{padding:10px 18px;background:#f8fafc;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.detail-head-left{font-size:12px;font-weight:700;color:var(--muted);}

.stu-list-assign{max-height:400px;overflow-y:auto;}
.stu-row-assign{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid #f8fafc;transition:var(--tr);}
.stu-row-assign:last-child{border:none;}
.stu-row-assign:hover{background:#f8fafc;}
.av-sm{width:32px;height:32px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}

/* toggle submitted */
.submitted-toggle{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;}
.stog-btn{font-family:'Sarabun',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;border:none;cursor:pointer;transition:var(--tr);}
.stog-btn.active-yes{background:#f0fdf4;color:#15803d;}
.stog-btn.active-no{background:#fef2f2;color:#dc2626;}
.stog-btn:not(.active-yes):not(.active-no){background:#fff;color:var(--muted);}

/* ── MOBILE ── */
@media(max-width:767px){
  .main{margin-left:0;}
  .sidebar{display:none;}
  .content{padding:14px 14px 80px;}
  .topbar{padding:0 14px;}
  .prog-wrap{width:70px;}
  .assign-name{font-size:14px;}
}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8edf2;height:60px;display:none;z-index:200;box-shadow:0 -1px 0 rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Sarabun',sans-serif;padding:6px 0 4px;}
.bn-ico svg{width:24px;height:24px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.bn-lbl{font-size:10px;font-weight:600;color:#9ca3af;}
.bn-item.active .bn-ico svg{stroke:var(--primary);}
.bn-item.active .bn-lbl{color:var(--primary);font-weight:700;}
@media(max-width:767px){.bottom-nav{display:flex;}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <img src="classkru-logo.png" alt="ClassKru" style="height:68px;width:auto;">
    </div>
    <div class="sb-nav-sec">เมนู</div>
    <div class="sb-link" onclick="go('index.html')">
      <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>หน้าหลัก
    </div>
    <div class="sb-link" onclick="go('dashboard.html')">
      <span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>ภาพรวมห้องเรียน
    </div>
    <div class="sb-link" onclick="go('attendance.html')">

    </div>

    </div>

      <span class="ico"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg></span>งานที่มอบหมาย

  <!-- MAIN -->
  <div class="main">

          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>

        งานที่มอบหมาย

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bn-item" onclick="go('index.html')">
    <span class="bn-ico"><svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V10.5z"/><path d="M9 21V13h6v8"/></svg></span>
    <span class="bn-lbl">หน้าหลัก</span>
  </button>
  <button class="bn-item" onclick="go('dashboard.html')">
    <span class="bn-ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
    <span class="bn-lbl">ภาพรวม</span>
  </button>
  <button class="bn-item" onclick="go('attendance.html')">
    <span class="bn-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg></span>
    <span class="bn-lbl">เช็คชื่อ</span>
  </button>
  <button class="bn-item" onclick="go('scores.html')">
    <span class="bn-ico"><svg viewBox="0 0 24 24"><path d="M12 20V10M18 20V4M6 20v-4"/></svg></span>
    <span class="bn-lbl">คะแนน</span>
  </button>
  <button class="bn-item active">
    <span class="bn-ico"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg></span>
    <span class="bn-lbl">งาน</span>
  </button>
</nav>

<div class="toast" id="toast-el"></div>

<script src="ck-data.js"></script>
<script>
const CLASSES = CK.CLASSES;
const params = new URLSearchParams(window.location.search);
let currentClass = params.get('class')||'m31';
if(!CLASSES.find(c=>c.id===currentClass)) currentClass='m31';

const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DAYS=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const TYPE_COLOR={exam:{bg:'#fef2f2',c:'#dc2626',cls:'tb-exam',label:'สอบ'},hw:{bg:'#eff6ff',c:'#1d4ed8',cls:'tb-hw',label:'ใบงาน'},project:{bg:'#fdf4ff',c:'#7e22ce',cls:'tb-project',label:'โปรเจกต์'},quiz:{bg:'#f0fdf4',c:'#15803d',cls:'tb-quiz',label:'Quiz'}};

function go(url){ window.location.href=url; }
function showToast(msg){
  const t=document.getElementById('toast-el');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

function buildClassTabs(){
  document.getElementById('class-tabs').innerHTML=CLASSES.map(c=>{
    const lc=CK.LEVEL_COLORS[c.level||'junior'];
    const active=c.id===currentClass;
    return `<button class="class-tab ${active?'active':''}" onclick="switchClass('${c.id}')"
      style="${active?`border-color:${lc.icon};background:${lc.bg};color:${lc.text};`:''}">${c.name}</button>`;
  }).join('');
}

function switchClass(id){
  currentClass=id;
  buildClassTabs();
  renderAssignments();
}

let openCard=null; // id ของ assignment ที่กำลัง expand

function renderAssignments(){
  const assignments=CK.getAssignments(currentClass);
  const students=CK.getStudents(currentClass);
  const today=CK.fmtKey(new Date());

  if(assignments.length===0){
    document.getElementById('assign-grid').innerHTML=`
      <div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.3;margin-bottom:12px"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
        <div style="font-size:14px;font-weight:700">ยังไม่มีงานที่มอบหมาย</div>
      </div>`;
    return;
  }

  document.getElementById('assign-grid').innerHTML=assignments.map(a=>{
    const tc=TYPE_COLOR[a.type]||TYPE_COLOR.hw;
    const isOverdue=a.due<today;
    const isOpen=openCard===a.id;

    // นับว่าส่งแล้วกี่คน (มีคะแนน !== null)
    let submitted=0, missing=0;
    students.forEach(s=>{
      const scores=CK.getStudentScores(currentClass,s.id);
      const sc=scores[a.id];
      if(sc!==null&&sc!==undefined) submitted++;
      else missing++;
    });
    const pct=Math.round(submitted/students.length*100);
    const barColor=pct>=90?'#1d9e75':pct>=60?'#f59e0b':'#ef4444';

    const dueParts=a.due.split('-');
    const dueDisplay=`${parseInt(dueParts[2])} ${MONTHS[parseInt(dueParts[1])-1]} ${parseInt(dueParts[0])+543}`;

    // student rows
    const stuRows=students.map(s=>{
      const scores=CK.getStudentScores(currentClass,s.id);
      const sc=scores[a.id];
      const hasScore=sc!==null&&sc!==undefined;
      return `<div class="stu-row-assign">
        <div class="av-sm" style="background:${s.col.bg};color:${s.col.c}">${s.fn[0]}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;cursor:pointer" onclick="go('student.html?class=${currentClass}&id=${s.id}')">${s.fn} ${s.ln}</div>
          <div style="font-size:11px;color:var(--muted)">เลขที่ ${s.no}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${hasScore
            ?`<div style="font-size:14px;font-weight:800;color:var(--primary)">${sc}<span style="font-size:11px;color:var(--muted)"> /${a.maxScore}</span></div>`
            :`<div style="font-size:12px;font-weight:800;color:#dc2626;">ยังไม่ส่ง</div>`}
        </div>
      </div>`;
    }).join('');

    return `<div class="assign-card ${isOverdue&&missing>0?'overdue':''}" id="acard-${a.id}">
      <div class="assign-head" onclick="toggleCard('${a.id}')">
        <div class="assign-head-ico" style="background:${tc.bg}">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${tc.c}" stroke-width="1.8" stroke-linecap="round">
            ${a.type==='exam'
              ?'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>'
              :a.type==='project'
              ?'<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>'
              :a.type==='quiz'
              ?'<circle cx="12" cy="12" r="9"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
              :'<rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/>'}
          </svg>
        </div>
        <div style="flex:1;min-width:0">
          <div class="assign-name">${a.name}</div>
          <div class="assign-meta">
            <span class="type-badge ${tc.cls}">${tc.label}</span>
            <span>คะแนนเต็ม ${a.maxScore}</span>
            <span>${isOverdue?'<span style="color:#dc2626">เกินกำหนด</span>':'ครบ'} ${dueDisplay}</span>
          </div>
        </div>
        <div class="assign-right">
          <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="prog-lbl" style="color:${barColor}">${submitted}/${students.length} คน</div>
          ${isOverdue&&missing>0?`<span class="overdue-badge">ค้าง ${missing}</span>`:''}
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;transition:transform .2s;${isOpen?'transform:rotate(180deg)':''}"><path d="M6 9l6 6 6-6"/></svg>
      </div>

      <div class="assign-detail ${isOpen?'open':''}" id="adetail-${a.id}">
        <div class="detail-head">
          <div class="detail-head-left">ส่งแล้ว ${submitted} คน · ยังไม่ส่ง ${missing} คน</div>
          <button class="btn btn-outline btn-sm" onclick="go('scores.html?class=${currentClass}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
            กรอกคะแนน
          </button>
        </div>
        <div class="stu-list-assign">${stuRows}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(openCard===id){
    openCard=null;
  } else {
    openCard=id;
  }
  renderAssignments();
  // scroll into view
  if(openCard){
    setTimeout(()=>{
      const el=document.getElementById('acard-'+openCard);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}

function init(){
  const now=new Date();
  const sbDate=document.getElementById('sb-date');
  if(sbDate) sbDate.textContent=`วัน${DAYS[now.getDay()]}ที่ ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()+543}`;
  buildClassTabs();
  renderAssignments();
}
init();
</script>
</body>
