<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>วิชา / ห้องเรียน — ClassKru</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --primary:#1d9e75;--pk:#0f6e56;--pbg:#f0fdf4;--pbd:#86efac;
  --bg:#f5f7fa;--card:#fff;--text:#0f172a;--muted:#5b6675;--border:#e8edf2;
  --sh:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.10);
  --tr:all .18s cubic-bezier(.4,0,.2,1);--sidebar-w:200px;
}
html,body{height:100%;font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);}
.btn{font-family:'Sarabun',sans-serif;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr);border-radius:12px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--primary);color:#fff;font-size:15px;padding:10px 20px;}
.btn-primary:hover{background:var(--pk);}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);font-size:14px;padding:9px 16px;}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(15,23,42,.88);color:#fff;font-size:13px;font-weight:700;padding:9px 20px;border-radius:22px;white-space:nowrap;z-index:9999;transition:transform .25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── subject list ── */
.subj-list{display:flex;flex-direction:column;gap:10px;}
.subj-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:var(--tr);box-shadow:var(--sh);}
.subj-card:hover{border-color:var(--pbd);box-shadow:var(--sh-md);}
.subj-card:active{transform:scale(.99);}
.subj-dot{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.subj-dot svg{width:22px;height:22px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.subj-info{flex:1;min-width:0;}
.subj-name{font-size:15.5px;font-weight:800;color:var(--text);}
.subj-meta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;}
.subj-meta span{display:inline-flex;align-items:center;gap:3px;}
.subj-arrow svg{width:18px;height:18px;stroke:#cbd5e1;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

.empty-box{text-align:center;padding:40px 20px;}
.empty-box .ic{width:64px;height:64px;border-radius:18px;background:var(--pbg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty-box .ic svg{width:32px;height:32px;stroke:var(--primary);stroke-width:1.6;fill:none;stroke-linecap:round;}

/* ── modal (จัดการวิชา) ── */
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-ov.show{opacity:1;pointer-events:all;}
.modal{position:fixed;z-index:501;background:#fff;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
/* mobile: bottom sheet */
.modal{bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;border-radius:22px 22px 0 0;max-height:92dvh;padding-bottom:env(safe-area-inset-bottom,0);}
.modal.open{transform:translateX(-50%) translateY(0);}
@media(min-width:768px){
  .modal{top:50%;left:50%;transform:translate(-50%,-46%);width:min(520px,92vw);border-radius:20px;max-height:88vh;opacity:0;pointer-events:none;}
  .modal.open{transform:translate(-50%,-50%);opacity:1;pointer-events:all;}
}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:10px auto 0;}
@media(min-width:768px){.modal-handle{display:none;}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px 20px 24px;}

.field{margin-bottom:16px;}
.field-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;display:block;}
.field-label .opt{font-weight:500;color:var(--muted);font-size:12px;}
.input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);transition:var(--tr);background:#fff;}
.input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,158,117,.12);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mtab{font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:var(--muted);background:none;border:none;padding:12px 14px;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;}
.mtab-active{color:var(--primary);border-bottom-color:var(--primary);}
.stu-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1.5px solid var(--border);border-radius:12px;background:#fff;}
.stu-row .no{font-size:13px;font-weight:800;color:#94a3b8;width:26px;flex-shrink:0;text-align:center;}
.stu-row .av{width:34px;height:34px;border-radius:10px;background:#f1f5f9;color:#64748b;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.stu-row .nm{flex:1;font-size:14px;font-weight:700;min-width:0;}
.stu-row .act{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stu-row .act:hover{border-color:var(--primary);color:var(--primary);}
.color-row{display:flex;gap:10px;flex-wrap:wrap;}
.color-dot{width:34px;height:34px;border-radius:10px;cursor:pointer;border:3px solid transparent;transition:var(--tr);}
.color-dot.sel{border-color:var(--text);transform:scale(1.08);}

.section-divider{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin:22px 0 10px;}
.danger-zone{border:1.5px solid #fecaca;border-radius:14px;padding:14px;background:#fef2f2;}
.danger-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;}
.danger-item:not(:last-child){border-bottom:1px solid #fecaca;}
.danger-text{flex:1;}
.danger-text .t{font-size:13.5px;font-weight:700;color:#991b1b;}
.danger-text .s{font-size:11.5px;color:#b91c1c;margin-top:1px;}
.btn-danger{background:#fff;border:1.5px solid #f87171;color:#dc2626;font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Sarabun',sans-serif;}
.btn-danger:hover{background:#dc2626;color:#fff;border-color:#dc2626;}

/* ══ MOBILE ══ */
.m-wrap{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto;}
.m-topbar{background:#fff;border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;box-shadow:var(--sh);position:sticky;top:0;z-index:50;}
.m-back{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.m-back svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.m-title{font-size:16px;font-weight:800;flex:1;}
.m-add{width:34px;height:34px;border-radius:10px;border:none;background:var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.m-add svg{width:20px;height:20px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;}
.m-scroll{flex:1;overflow-y:auto;padding:16px 14px calc(76px + env(safe-area-inset-bottom,0));}
.m-bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);height:62px;display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0);}
.m-bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Sarabun',sans-serif;padding:6px 0 4px;}
.m-bn:active{opacity:.6;}
.m-bn svg{width:22px;height:22px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.m-bn span{font-size:10px;font-weight:600;color:#9ca3af;}
.m-bn.active svg{stroke:var(--primary);}
.m-bn.active span{color:var(--primary);font-weight:700;}

/* ══ DESKTOP ══ */
.d-wrap{display:none;}
@media(min-width:768px){
  .m-wrap{display:none;}
  .d-wrap{display:flex;height:100vh;overflow:hidden;}
  .d-sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;}
  .d-sb-logo{padding:0;border-bottom:1px solid var(--border);display:flex;justify-content:center;align-items:center;height:96px;}
  .d-sb-sec{padding:14px 16px 4px;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;}
  .d-sb-link{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:var(--tr);border-left:3px solid transparent;}
  .d-sb-link:hover{background:#f8fafc;color:var(--text);}
  .d-sb-link.active{background:var(--pbg);color:var(--primary);border-left-color:var(--primary);}
  .d-sb-link svg{width:18px;height:18px;stroke:#9ca3af;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:stroke .15s;}
  .d-sb-link.active svg,.d-sb-link:hover svg{stroke:var(--primary);}
  .d-sb-spacer{flex:1;}
  .d-sb-date{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600;}
  .d-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .d-topbar{background:#fff;border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 28px;gap:12px;flex-shrink:0;box-shadow:var(--sh);}
  .d-topbar-title{font-size:16px;font-weight:800;flex:1;display:flex;align-items:center;gap:8px;}
  .d-scroll{flex:1;overflow-y:auto;padding:28px 48px 40px;}
  .d-content{max-width:680px;}
}
</style>
</head>
<body>

<!-- ══ MOBILE ══ -->
<div class="m-wrap">
  <div class="m-topbar">
    <button class="m-back" onclick="go('settings.html')"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div class="m-title">ห้องเรียน</div>
    <button class="m-add" onclick="openCreate()" title="เพิ่มวิชา"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>
  <div class="m-scroll" id="m-content"></div>
  <nav class="m-bottom-nav">
    <button class="m-bn" onclick="go('index.html')">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>หน้าหลัก</span>
    </button>
    <button class="m-bn" onclick="go('schedule.html')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
      <span>ตารางสอน</span>
    </button>
    <button class="m-bn" style="position:relative;" onclick="go('attendance.html')">
      <div style="position:absolute;top:-14px;width:50px;height:50px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(29,158,117,.4);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <span style="margin-top:22px;color:var(--primary);font-weight:700;">เช็คชื่อ</span>
    </button>
    <button class="m-bn" onclick="go('report.html')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>สถิติ</span>
    </button>
    <button class="m-bn active" onclick="go('settings.html')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>ตั้งค่า</span>
    </button>
  </nav>
</div>

<!-- ══ DESKTOP ══ -->
<div class="d-wrap">
  <aside class="d-sidebar">
    <div class="d-sb-logo"><img src="classkru-logo.png" alt="ClassKru" style="height:68px;width:auto;"></div>
    <div class="d-sb-sec">เมนู</div>
    <div class="d-sb-link" onclick="go('index.html')"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>หน้าหลัก</div>
    <div class="d-sb-link" onclick="go('schedule.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>ตารางสอน</div>
    <div class="d-sb-link" onclick="go('attendance.html')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M9 16l2 2 4-4"/></svg>เช็คชื่อ</div>
    <div class="d-sb-link" onclick="go('report.html')"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>สถิติ</div>
    <div class="d-sb-link active" onclick="go('settings.html')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>ตั้งค่า</div>
    <div class="d-sb-spacer"></div>
    <div class="d-sb-date" id="d-date-sb"></div>
  </aside>
  <div class="d-main">
    <div class="d-topbar">
      <div class="d-topbar-title">
        <button class="m-back" style="border:1.5px solid var(--border);background:#fff;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="go('settings.html')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
        วิชา / ห้องเรียน
      </div>
      <button class="btn btn-primary" onclick="openCreate()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> เพิ่มวิชา</button>
    </div>
    <div class="d-scroll"><div class="d-content" id="d-content"></div></div>
  </div>
</div>

<!-- ── MODAL: จัดการวิชา ── -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target.id==='modal-ov')closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-head">
    <div class="modal-title" id="modal-title">เพิ่มวิชา</div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>

  <!-- แท็บ (เฉพาะตอนแก้วิชา) -->
  <div id="modal-tabs" style="display:none;padding:0 20px;border-bottom:1px solid var(--border);gap:4px;">
    <button class="mtab mtab-active" id="mtab-info" onclick="switchTab('info')">ข้อมูลวิชา</button>
    <button class="mtab" id="mtab-students" onclick="switchTab('students')">รายชื่อนักเรียน</button>
  </div>

  <div class="modal-body" id="tab-info">
    <!-- 2.1 ข้อมูลพื้นฐาน -->
    <div class="field">
      <label class="field-label">วิชา</label>
      <input class="input" id="f-subject" placeholder="เช่น สุขศึกษา, พลศึกษา" oninput="autoColorFromSubject()">
    </div>
    <div class="row2">
      <div class="field">
        <label class="field-label">ระดับชั้น</label>
        <input class="input" id="f-grade" placeholder="เช่น ม.1, ป.6" oninput="autoColorFromGrade()">
      </div>
      <div class="field">
        <label class="field-label">ห้อง</label>
        <input class="input" id="f-room" placeholder="เช่น 1, 2">
      </div>
    </div>
    <div class="field">
      <label class="field-label">สีประจำวิชา <span class="opt">เลือกเองได้</span></label>
      <div class="color-row" id="color-picker-row"></div>
    </div>

    <!-- Danger zone (เฉพาะตอนแก้) -->
    <div id="danger-block" style="display:none;">
      <div class="section-divider">⚠ Danger Zone</div>
      <div class="danger-zone">
        <div class="danger-item">
          <div class="danger-text">
            <div class="t">รีเซ็ตการเช็คชื่อวิชานี้</div>
            <div class="s">ลบประวัติการเช็คชื่อทั้งหมดของวิชานี้</div>
          </div>
          <button class="btn-danger" onclick="confirmReset()">รีเซ็ต</button>
        </div>
        <div class="danger-item">
          <div class="danger-text">
            <div class="t">ลบวิชา / ห้องนี้</div>
            <div class="s">ลบวิชา ตารางสอน และรายชื่อทั้งหมด</div>
          </div>
          <button class="btn-danger" onclick="confirmDelete()">ลบ</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-save" onclick="saveSubject()" style="width:100%;margin-top:22px;padding:13px;">บันทึก</button>
  </div>

  <!-- TAB 2: รายชื่อนักเรียน -->

const LEVEL_COLORS = (window.CKService&&CKService.LEVEL_COLORS)||{primary:{icon:'#d99a4e'},junior:{icon:'#6cae8f'},senior:{icon:'#7b9bb5'}};
const PALETTE=['#4a9b94','#6cae8f','#7b9bb5','#d99a4e','#d98a9e','#9d8ec4','#3f8c84','#c98aa6'];

let _sections=[];
let _counts={};
let _editId=null;      // null = สร้างใหม่
let _selColor=PALETTE[0];

const BOOK_SVG=`<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`;

function gradeLevel(grade){
  if(!grade) return 'junior';
  if(grade.startsWith('ป.')) return 'primary';
  const n=parseInt((grade||'').replace('ม.',''));
  return n<=3?'junior':'senior';
}

function listHtml(){

    return `<div class="empty-box">

    </div>`;
  }
  let html=`<div class="subj-list">`;
  _sections.forEach(s=>{
    const color=(window.CKService&&CKService.pastelize?CKService.pastelize(s.color):s.color)||LEVEL_COLORS[s.level||'junior'].icon;
    const periods=_counts[s.id]||0;
    html+=`<div class="subj-card" onclick="openEdit('${s.id}')">
      <div class="subj-dot" style="background:${color}">${BOOK_SVG}</div>

        <div class="subj-name">${s.subject} ${s.grade}/${s.room}</div>

          <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>นักเรียน ${s.count||0} คน</span>
          <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${periods} คาบ/สัปดาห์</span>
        </div>
      </div>
      <div class="subj-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  });

}

// สี default ตามหมวดวิชา
const SUBJECT_DEFAULT_COLORS = [
  {label:'วิทยาศาสตร์', keywords:['วิทย','science','ฟิสิกส์','เคมี','ชีวะ','ชีววิทยา'], color:'#4a9b94'},
  {label:'คณิตศาสตร์',  keywords:['คณิต','math'],                                       color:'#7b9bb5'},
  {label:'ภาษาไทย',     keywords:['ภาษาไทย','ไทย'],                                     color:'#d99a4e'},
  {label:'ภาษาอังกฤษ',  keywords:['อังกฤษ','english'],                                  color:'#9d8ec4'},
  {label:'สังคมศึกษา',  keywords:['สังคม','ประวัติ','ภูมิศาสตร์'],                      color:'#c98aa6'},
  {label:'พละ/สุขศึกษา',keywords:['พล','สุขศึกษา','พลศึกษา'],                           color:'#6cae8f'},
  {label:'ศิลปะ',       keywords:['ศิลป','ดนตรี','นาฏ'],                                color:'#d98a9e'},
  {label:'การงานอาชีพ', keywords:['การงาน','อาชีพ','คอมพิวเตอร์','เทคโนโลยี'],          color:'#8fa8c8'},
];
const SWATCHES = ['#4a9b94','#7b9bb5','#d99a4e','#9d8ec4','#c98aa6','#6cae8f','#d98a9e','#8fa8c8','#e07b54','#5b8dd9'];

function defaultColorFromSubject(name){
  if(!name) return SWATCHES[0];
  const n=name.toLowerCase();
  for(const s of SUBJECT_DEFAULT_COLORS){
    if(s.keywords.some(k=>n.includes(k))) return s.color;
  }
  return SWATCHES[0];
}

function renderColorPicker(){
  const row=document.getElementById('color-picker-row');
  if(!row) return;
  row.innerHTML=SWATCHES.map(c=>`
    <div class="color-dot${_selColor===c?' sel':''}" style="background:${c}"
      onclick="pickColor('${c}')"></div>`).join('');
}

function pickColor(c){
  _selColor=c;
  renderColorPicker();
}

function autoColorFromSubject(){
  const name=document.getElementById('f-subject').value.trim();
  if(name) _selColor=defaultColorFromSubject(name);
  renderColorPicker();
}
function renderColors(){ renderColorPicker(); }

function openCreate(){
  _editId=null;_selColor=SWATCHES[0];
  document.getElementById('modal-title').textContent='เพิ่มวิชา';
  document.getElementById('f-subject').value='';
  document.getElementById('f-grade').value='';
  document.getElementById('f-room').value='';
  document.getElementById('danger-block').style.display='none';
  document.getElementById('modal-tabs').style.display='none';

}

function openEdit(id){
  const s=_sections.find(x=>x.id===id);
  if(!s) return;
  _editId=id;_selColor=s.color||defaultColorFromSubject(s.subject)||SWATCHES[0];
  document.getElementById('modal-title').textContent=`${s.subject} ${s.grade}/${s.room}`;
  document.getElementById('f-subject').value=s.subject||'';
  document.getElementById('f-grade').value=s.grade||'';
  document.getElementById('f-room').value=s.room||'';
  document.getElementById('danger-block').style.display='';
  document.getElementById('modal-tabs').style.display='flex';
  switchTab('info');
  renderColorPicker();

// ── TAB switching ──
function switchTab(tab){

  document.getElementById('tab-info').style.display=isInfo?'':'none';
  document.getElementById('tab-students').style.display=isInfo?'none':'';

// ── STUDENT management ──
let _modalStudents=[];

async function loadStudentsForModal(sectionId){
  _modalStudents = await CKService.getStudents(sectionId);
  renderStudentList();
}

function renderStudentList(){
  document.getElementById('stu-count-label').textContent=`นักเรียน ${_modalStudents.length} คน`;
  const el=document.getElementById('stu-list');
  if(!_modalStudents.length){
    el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">ยังไม่มีนักเรียน — กด "เพิ่มนักเรียน"</div>`;

      <button class="act" onclick="openEditStudent('${s.id}')" title="แก้ไข">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
      </button>

let _editStudentId=null;
function setStuTab(tab){
  const isSingle = tab==='single';
  document.getElementById('sf-pane-single').style.display = isSingle ? '' : 'none';
  document.getElementById('sf-pane-bulk').style.display   = isSingle ? 'none' : '';
  document.getElementById('sf-tab-single').style.color = isSingle ? 'var(--primary)' : 'var(--muted)';
  document.getElementById('sf-tab-single').style.borderBottom = isSingle ? '2px solid var(--primary)' : 'none';
  document.getElementById('sf-tab-bulk').style.color = isSingle ? 'var(--muted)' : 'var(--primary)';
  document.getElementById('sf-tab-bulk').style.borderBottom = isSingle ? 'none' : '2px solid var(--primary)';
}

function previewBulk(){
  const raw = document.getElementById('sf-bulk-raw').value.trim();
  if(!raw){ document.getElementById('sf-bulk-preview').textContent=''; return; }
  const students = parseBulkRaw(raw);
  document.getElementById('sf-bulk-preview').innerHTML =
    `<span style="color:var(--primary);font-weight:700;">✓ พบ ${students.length} คน</span> — ${students.slice(0,3).map(s=>s.first).join(', ')}${students.length>3?'...':''}`;
}

function parseBulkRaw(raw){
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  return lines.map((line,i)=>{
    let clean = line.replace(/^(ด\.ช\.|ด\.ญ\.|นาย|นางสาว|นาง)\s*/,'').trim();
    const numMatch = clean.match(/^(\d+)\s+(.+)/);
    let no = i+1, rest = clean;
    if(numMatch){ no = parseInt(numMatch[1]); rest = numMatch[2].trim(); }
    const parts = rest.split(/\s+/);
    return { no, first: parts[0]||'', last: parts.slice(1).join(' ')||'' };
  });
}

async function saveBulkStudents(){
  const raw = document.getElementById('sf-bulk-raw').value.trim();
  if(!raw){ return; }
  const students = parseBulkRaw(raw);
  if(!students.length){ return; }
  const btn = document.querySelector('#sf-pane-bulk .btn-primary');
  if(btn){ btn.disabled=true; btn.textContent='กำลังบันทึก...'; }
  try{
    for(const s of students){
      await CKService.addStudent(_editId,{student_number:s.no, first_name:s.first, last_name:s.last});
    }
    showToast(`เพิ่ม ${students.length} คนแล้ว`);
    document.getElementById('sf-bulk-raw').value='';
    document.getElementById('sf-bulk-preview').textContent='';
    closeStuModal();
    await loadStudentsForModal(_editId);
  } catch(e){
    showToast('เกิดข้อผิดพลาด');
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='บันทึกทั้งหมด'; }
  }
}

function openAddStudent(){
  _editStudentId=null;
  document.getElementById('stu-modal-title').textContent='เพิ่มนักเรียน';
  document.getElementById('sf-tabs').style.display='flex';
  document.getElementById('sf-no').value=_modalStudents.length?Math.max(..._modalStudents.map(s=>s.no||0))+1:1;
  document.getElementById('sf-first').value='';
  document.getElementById('sf-last').value='';
  document.getElementById('sf-move-block').style.display='none';
  document.getElementById('sf-delete').style.display='none';
  document.getElementById('sf-bulk-raw').value='';
  document.getElementById('sf-bulk-preview').textContent='';
  setStuTab('bulk'); // default bulk เพราะส่วนใหญ่จะวางรายชื่อ
  openStuModal();
}

function openEditStudent(studentId){
  const s=_modalStudents.find(x=>x.id===studentId);
  if(!s) return;
  _editStudentId=studentId;
  document.getElementById('stu-modal-title').textContent='แก้ไขนักเรียน';
  document.getElementById('sf-tabs').style.display='none';
  setStuTab('single');
  document.getElementById('sf-no').value=s.no||'';
  document.getElementById('sf-first').value=s.fn||'';
  document.getElementById('sf-last').value=s.ln||'';
  // ย้ายห้อง: เติม dropdown ห้องอื่น
  const moveSel=document.getElementById('sf-move');
  moveSel.innerHTML='<option value="">— อยู่ห้องเดิม —</option>'+
    _sections.filter(x=>x.id!==_editId).map(x=>`<option value="${x.id}">${x.subject} ${x.grade}/${x.room}</option>`).join('');
  document.getElementById('sf-move-block').style.display=_sections.length>1?'':'none';
  document.getElementById('sf-delete').style.display='';
  openStuModal();
}

function openStuModal(){document.getElementById('stu-modal-ov').classList.add('show');document.getElementById('stu-modal').classList.add('open');}
function closeStuModal(){document.getElementById('stu-modal-ov').classList.remove('show');document.getElementById('stu-modal').classList.remove('open');}

async function saveStudent(){
  const no=document.getElementById('sf-no').value;
  const first=document.getElementById('sf-first').value.trim();
  const last=document.getElementById('sf-last').value.trim();
  if(!first){ showToast('กรอกชื่อนักเรียน'); return; }
  const btn=document.getElementById('sf-save');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    if(_editStudentId){
      await CKService.updateStudent(_editStudentId,{student_number:no,first_name:first,last_name:last});
      // ย้ายห้อง?
      const moveTo=document.getElementById('sf-move').value;
      if(moveTo){ await CKService.moveStudent(_editStudentId,_editId,moveTo); }
      showToast('บันทึกแล้ว');
    } else {
      await CKService.addStudent(_editId,{student_number:no,first_name:first,last_name:last});
      showToast('เพิ่มนักเรียนแล้ว');
    }
    closeStuModal();
    await loadStudentsForModal(_editId);
    await reload(); // อัปเดต count การ์ดวิชา
  }catch(e){ console.error(e); showToast('เกิดข้อผิดพลาด'); }
  btn.disabled=false;btn.textContent='บันทึก';
}

async function deleteStudentConfirm(){
  if(!_editStudentId) return;
  const s=_modalStudents.find(x=>x.id===_editStudentId);
  if(!confirm(`ลบ "${s?.fn} ${s?.ln}" ออกจากห้องนี้?`)) return;
  const ok=await CKService.deleteStudent(_editStudentId,_editId);
  if(ok){ showToast('ลบแล้ว'); closeStuModal(); await loadStudentsForModal(_editId); await reload(); }
  else showToast('ลบไม่สำเร็จ');
}

function openModal(){document.getElementById('modal-ov').classList.add('show');document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal-ov').classList.remove('show');document.getElementById('modal').classList.remove('open');}

async function saveSubject(){
  const subject=document.getElementById('f-subject').value.trim();
  const grade=document.getElementById('f-grade').value.trim();
  const room=document.getElementById('f-room').value.trim();
  if(!subject||!grade||!room){ showToast('กรอกวิชา ระดับชั้น และห้องให้ครบ'); return; }

  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';

  try{
    if(_editId){
      const ok=await CKService.updateSection(_editId,{subject_name:subject,grade_level:grade,room,color:_selColor});
      if(!ok){ showToast('บันทึกไม่สำเร็จ'); btn.disabled=false;btn.textContent='บันทึก'; return; }
      showToast('แก้ไขวิชาแล้ว');
    } else {
      const created=await CKService.createSection({subject_name:subject,grade_level:grade,room,color:_selColor});
      if(!created){ showToast('สร้างไม่สำเร็จ — อาจมีวิชา/ห้องนี้แล้ว'); btn.disabled=false;btn.textContent='บันทึก'; return; }
      showToast('เพิ่มวิชาแล้ว');
    }
    await reload();
    closeModal();
  }catch(e){ console.error(e); showToast('เกิดข้อผิดพลาด'); }
  btn.disabled=false;btn.textContent='บันทึก';
}

async function confirmReset(){
  if(!_editId) return;
  if(!confirm('รีเซ็ตการเช็คชื่อของวิชานี้ทั้งหมด?\nข้อมูลการเช็คชื่อจะหายและกู้คืนไม่ได้')) return;
  const ok=await CKService.resetSectionAttendance(_editId);
  showToast(ok?'รีเซ็ตการเช็คชื่อแล้ว':'รีเซ็ตไม่สำเร็จ');
}

async function confirmDelete(){
  if(!_editId) return;
  const s=_sections.find(x=>x.id===_editId);
  if(!confirm(`ลบวิชา "${s?.subject} ${s?.grade}/${s?.room}"?\nวิชา ตารางสอน และรายชื่อนักเรียนทั้งหมดจะถูกลบ กู้คืนไม่ได้`)) return;
  const ok=await CKService.deleteSection(_editId);
  if(ok){ showToast('ลบวิชาแล้ว'); await reload(); closeModal(); }
  else showToast('ลบไม่สำเร็จ');
}

async function reload(){
  _sections=await CKService.loadSections();
  _counts=await CKService.getScheduleCountBySection();
  renderList();
}

(async function(){
  try{ await CKService.requireAuth(); }catch(e){}
  await CKService.loadSchedules();
  await reload();
  const sb=document.getElementById('d-date-sb');
  if(sb){
    const M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const D=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    const n=new Date();
    sb.textContent=`วัน${D[n.getDay()]}ที่ ${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()+543}`;
  }
})();
</script>
